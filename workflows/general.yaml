id: general
name: General
description: >
  A lightweight workflow for general-purpose goals. Produces a design
  document, implementation, test results, code review, and a summary
  report. Suitable for most tasks that don't need a specialised workflow.
artifacts:
  - id: design-doc
    name: Design Document
    description: Architecture, approach, and file changes planned
    kind: analysis
    format: markdown
    dependsOn: []
    mustHave:
      - Description of approach
      - File changes planned
      - Acceptance criteria
    shouldHave:
      - Risk assessment
      - Alternative approaches considered
    mustNotHave:
      - Implementation code (that's a separate artifact)
    verification:
      type: llm-review
      prompt: |
        Review this design document. Verify:
        1. Approach is clearly described
        2. File changes are listed
        3. Acceptance criteria are specific and testable

  - id: implementation
    name: Implementation
    description: Code changes committed to goal branch
    kind: deliverable
    format: diff
    dependsOn: [design-doc]
    mustHave:
      - All changes committed to goal branch
      - Type-check passes (npm run check or equivalent)
      - Addresses design requirements
    mustNotHave:
      - Commented-out code
      - Unrelated changes mixed in
    suggestedRole: coder
    verification:
      type: command
      steps:
        - name: "Type check passes"
          type: command
          command: "npm run check"
          timeout: 120

  - id: test-results
    name: Test Results
    description: Test suite results proving no regressions
    kind: verification
    format: command
    dependsOn: [implementation]
    mustHave:
      - Test suite run command and output
      - All tests pass
    verification:
      type: command
      steps:
        - name: "Test suite passes"
          type: command
          command: "{{command}}"
          timeout: 600

  - id: code-review
    name: Code Review
    description: Review of the implementation
    kind: review
    format: markdown
    dependsOn: [implementation]
    mustHave:
      - Specific observations about the code
      - Clear accept/reject verdict
    mustNotHave:
      - Rubber-stamp approval without specific observations
    suggestedRole: reviewer
    verification:
      type: llm-review
      prompt: |
        Review this code review artifact. Verify:
        1. The reviewer made specific observations about the code
        2. There is a clear verdict (accept/reject) with reasoning

  - id: summary-report
    name: Summary Report
    description: Final summary of the goal lifecycle
    kind: deliverable
    format: html
    dependsOn: [code-review, test-results]
    mustHave:
      - Goal summary
      - Implementation description
      - Test evidence
      - Review outcome
    verification:
      type: llm-review
      prompt: |
        Review this summary report. Verify all sections are present
        and substantive (not just headings with placeholder text).
