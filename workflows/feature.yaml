id: feature
name: Feature
description: Implement a new feature with design, implementation, and review

gates:
  - id: design-doc
    name: Design Document
    content: true
    inject_downstream: true
    verify:
      - name: "Design quality"
        type: llm-review
        prompt: |
          Review this design document. Verify:
          1. Architecture and API surface are clearly described
          2. File changes are listed with rationale
          3. Acceptance criteria are specific and testable

  - id: implementation
    name: Implementation
    depends_on: [design-doc]
    verify:
      - name: "Type check passes"
        type: command
        run: "npm run check"
      - name: "Full test suite"
        type: command
        run: "npm test"
      - name: "Code review"
        type: llm-review
        prompt: |
          Review the implementation for correctness, completeness, and code quality.

  - id: ready-to-merge
    name: Ready to Merge
    depends_on: [implementation]
    verify:
      - name: "Branch pushed to remote"
        type: command
        run: "git ls-remote --heads origin $(git rev-parse --abbrev-ref HEAD) | grep -q ."
      - name: "All gates passed"
        type: command
        run: "echo 'All upstream gates passed'"
