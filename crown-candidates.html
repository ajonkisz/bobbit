<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crown Variants</title>
<link rel="stylesheet" href="/src/ui/app.css">
<link rel="stylesheet" href="/src/app/app.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 1.5rem; }
h1 { font-size: 1.2rem; text-align: center; margin-bottom: 0.25rem; }
.subtitle { text-align: center; color: #64748b; font-size: 0.75rem; margin-bottom: 1.5rem; }

.candidates { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
.candidate { background: #1e293b; border-radius: 12px; padding: 1.25rem; min-width: 280px; flex: 1; max-width: 360px; }
.cand-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; }
.cand-desc { font-size: 0.72rem; color: #64748b; margin-bottom: 1rem; }

.row-section { margin-bottom: 1rem; }
.row-label { font-size: 0.65rem; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }

.blob-row { display: flex; gap: 0.75rem; align-items: end; flex-wrap: wrap; }
.blob-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.blob-cell-label { font-size: 0.6rem; color: #475569; }
.blob-wrap {
  position: relative; width: 80px; height: 90px;
  display: flex; align-items: center; justify-content: center;
}
.blob-wrap .bobbit-blob { position: relative; margin: 0 !important; padding-top: 6px; }

.sidebar-mock { background: #111827; border-radius: 8px; padding: 0.4rem; border: 1px solid #1e293b; }
.sidebar-row { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 6px; }
.sidebar-row.active { background: #1e293b; }
.sidebar-title { font-size: 0.75rem; color: #e2e8f0; }
.sidebar-time { font-size: 0.6rem; color: #64748b; }

/* Crown candidate overlay — sits on head, warps with body like real crown */
.bobbit-blob__candidate-crown {
  display: block;
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: visible;
  transform-origin: 5px 8px;
  transform: scale(3.5) translateX(-0.5px);
  margin: 8px 18px 28px 18px;
  image-rendering: pixelated;
  filter: hue-rotate(calc(-1 * var(--bobbit-hue-rotate, 0deg)));
  animation: blob-busy-move 10s cubic-bezier(0.34, 1, 0.64, 1) infinite;
}
.bobbit-blob--idle .bobbit-blob__candidate-crown {
  animation: none;
  transform: scale(3.5) translateX(-7.5px);
}
</style>
</head>
<body>
<h1>Crown Variants — 3 Options</h1>
<p class="subtitle">Real app.css rendering — sidebar (1.6x) and chat blob (3.5x) at multiple hues</p>

<div class="candidates" id="candidates"></div>

<script type="module">
import { statusBobbit, BOBBIT_HUE_ROTATIONS } from '/src/app/session-colors.ts';
import { html, render as litRender } from '/node_modules/lit/index.js';

const CANDIDATES = [
  {
    key: 'current',
    title: 'A: Current Crown',
    desc: 'Existing 3-point crown — gold with amber band',
    shadow: `
      3px -2px 0 #000, 5px -2px 0 #000, 7px -2px 0 #000,
      2px -1px 0 #000, 3px -1px 0 #fde047, 4px -1px 0 #000, 5px -1px 0 #fde047, 6px -1px 0 #000, 7px -1px 0 #fde047, 8px -1px 0 #000,
      1px 0 0 #000, 2px 0 0 #fbbf24, 3px 0 0 #fde047, 4px 0 0 #fbbf24, 5px 0 0 #fde047, 6px 0 0 #fbbf24, 7px 0 0 #fde047, 8px 0 0 #fbbf24, 9px 0 0 #000,
      1px 1px 0 #000, 2px 1px 0 #b45309, 3px 1px 0 #d97706, 4px 1px 0 #d97706, 5px 1px 0 #d97706, 6px 1px 0 #d97706, 7px 1px 0 #d97706, 8px 1px 0 #b45309, 9px 1px 0 #000,
      1px 2px 0 #000, 2px 2px 0 #000, 3px 2px 0 #000, 4px 2px 0 #000, 5px 2px 0 #000, 6px 2px 0 #000, 7px 2px 0 #000, 8px 2px 0 #000, 9px 2px 0 #000
    `,
    sidebarShadow: `
      3px -1px 0 #000, 5px -1px 0 #000, 7px -1px 0 #000,
      2px 0 0 #000, 3px 0 0 #fde047, 4px 0 0 #000, 5px 0 0 #fde047, 6px 0 0 #000, 7px 0 0 #fde047, 8px 0 0 #000,
      1px 1px 0 #000, 2px 1px 0 #fbbf24, 3px 1px 0 #fde047, 4px 1px 0 #fbbf24, 5px 1px 0 #fde047, 6px 1px 0 #fbbf24, 7px 1px 0 #fde047, 8px 1px 0 #fbbf24, 9px 1px 0 #000,
      1px 2px 0 #000, 2px 2px 0 #b45309, 3px 2px 0 #d97706, 4px 2px 0 #d97706, 5px 2px 0 #d97706, 6px 2px 0 #d97706, 7px 2px 0 #d97706, 8px 2px 0 #b45309, 9px 2px 0 #000,
      1px 3px 0 #000, 2px 3px 0 #000, 3px 3px 0 #000, 4px 3px 0 #000, 5px 3px 0 #000, 6px 3px 0 #000, 7px 3px 0 #000, 8px 3px 0 #000, 9px 3px 0 #000
    `
  },
  {
    key: 'jeweled',
    title: 'B: Jeweled Crown',
    desc: '3-point crown with red gem centrepiece and brighter gold',
    shadow: `
      3px -2px 0 #000, 5px -2px 0 #000, 7px -2px 0 #000,
      2px -1px 0 #000, 3px -1px 0 #fef08a, 4px -1px 0 #000, 5px -1px 0 #fef08a, 6px -1px 0 #000, 7px -1px 0 #fef08a, 8px -1px 0 #000,
      1px 0 0 #000, 2px 0 0 #fde047, 3px 0 0 #fef08a, 4px 0 0 #fde047, 5px 0 0 #ef4444, 6px 0 0 #fde047, 7px 0 0 #fef08a, 8px 0 0 #fde047, 9px 0 0 #000,
      1px 1px 0 #000, 2px 1px 0 #ca8a04, 3px 1px 0 #eab308, 4px 1px 0 #eab308, 5px 1px 0 #eab308, 6px 1px 0 #eab308, 7px 1px 0 #eab308, 8px 1px 0 #ca8a04, 9px 1px 0 #000,
      1px 2px 0 #000, 2px 2px 0 #000, 3px 2px 0 #000, 4px 2px 0 #000, 5px 2px 0 #000, 6px 2px 0 #000, 7px 2px 0 #000, 8px 2px 0 #000, 9px 2px 0 #000
    `,
    sidebarShadow: `
      3px -1px 0 #000, 5px -1px 0 #000, 7px -1px 0 #000,
      2px 0 0 #000, 3px 0 0 #fef08a, 4px 0 0 #000, 5px 0 0 #fef08a, 6px 0 0 #000, 7px 0 0 #fef08a, 8px 0 0 #000,
      1px 1px 0 #000, 2px 1px 0 #fde047, 3px 1px 0 #fef08a, 4px 1px 0 #fde047, 5px 1px 0 #ef4444, 6px 1px 0 #fde047, 7px 1px 0 #fef08a, 8px 1px 0 #fde047, 9px 1px 0 #000,
      1px 2px 0 #000, 2px 2px 0 #ca8a04, 3px 2px 0 #eab308, 4px 2px 0 #eab308, 5px 2px 0 #eab308, 6px 2px 0 #eab308, 7px 2px 0 #eab308, 8px 2px 0 #ca8a04, 9px 2px 0 #000,
      1px 3px 0 #000, 2px 3px 0 #000, 3px 3px 0 #000, 4px 3px 0 #000, 5px 3px 0 #000, 6px 3px 0 #000, 7px 3px 0 #000, 8px 3px 0 #000, 9px 3px 0 #000
    `
  },
  {
    key: 'minimal',
    title: 'C: Slim Crown',
    desc: 'Compact 3-point — taller points, thinner band, more regal',
    shadow: `
      3px -3px 0 #000, 5px -3px 0 #000, 7px -3px 0 #000,
      2px -2px 0 #000, 3px -2px 0 #fef08a, 4px -2px 0 #000, 5px -2px 0 #fef08a, 6px -2px 0 #000, 7px -2px 0 #fef08a, 8px -2px 0 #000,
      1px -1px 0 #000, 2px -1px 0 #fde047, 3px -1px 0 #fef08a, 4px -1px 0 #fde047, 5px -1px 0 #fde047, 6px -1px 0 #fde047, 7px -1px 0 #fef08a, 8px -1px 0 #fde047, 9px -1px 0 #000,
      1px 0 0 #000, 2px 0 0 #000, 3px 0 0 #eab308, 4px 0 0 #eab308, 5px 0 0 #ef4444, 6px 0 0 #eab308, 7px 0 0 #eab308, 8px 0 0 #000, 9px 0 0 #000,
      2px 1px 0 #000, 3px 1px 0 #000, 4px 1px 0 #000, 5px 1px 0 #000, 6px 1px 0 #000, 7px 1px 0 #000, 8px 1px 0 #000
    `,
    sidebarShadow: `
      3px -2px 0 #000, 5px -2px 0 #000, 7px -2px 0 #000,
      2px -1px 0 #000, 3px -1px 0 #fef08a, 4px -1px 0 #000, 5px -1px 0 #fef08a, 6px -1px 0 #000, 7px -1px 0 #fef08a, 8px -1px 0 #000,
      1px 0 0 #000, 2px 0 0 #fde047, 3px 0 0 #fef08a, 4px 0 0 #fde047, 5px 0 0 #fde047, 6px 0 0 #fde047, 7px 0 0 #fef08a, 8px 0 0 #fde047, 9px 0 0 #000,
      1px 1px 0 #000, 2px 1px 0 #000, 3px 1px 0 #eab308, 4px 1px 0 #eab308, 5px 1px 0 #ef4444, 6px 1px 0 #eab308, 7px 1px 0 #eab308, 8px 1px 0 #000, 9px 1px 0 #000,
      2px 2px 0 #000, 3px 2px 0 #000, 4px 2px 0 #000, 5px 2px 0 #000, 6px 2px 0 #000, 7px 2px 0 #000, 8px 2px 0 #000
    `
  }
];

const HUES_IDX = [0, 5, 12];

function makeBlob(shadow, stateClass, hueIdx) {
  const hue = BOBBIT_HUE_ROTATIONS[hueIdx] || 0;
  return html`
    <div class="blob-wrap" style="--bobbit-hue-rotate: ${hue}deg">
      <div class=${'bobbit-blob ' + stateClass} style="filter: hue-rotate(${hue}deg); padding-top: 6px;">
        <div class="bobbit-blob__sprite"></div>
        <div class="bobbit-blob__shadow"></div>
        <div class="bobbit-blob__candidate-crown" style="box-shadow: ${shadow}"></div>
      </div>
    </div>
  `;
}

function makeSidebar(candidate, hueIdx, active) {
  const hue = BOBBIT_HUE_ROTATIONS[hueIdx] || 0;
  const fakeId = 'crown-' + candidate.key + '-' + hueIdx;
  const bobbit = statusBobbit('streaming', false, fakeId, active, false, false, false, 'none');
  return html`
    <div class="sidebar-row ${active ? 'active' : ''}">
      <div style="position:relative;width:16px;height:18px;flex-shrink:0;">
        ${bobbit}
        <span style="
          position:absolute; left:0; top:0;
          display:block; width:1px; height:1px; overflow:visible;
          transform:scale(1.6); transform-origin:0 0;
          image-rendering:pixelated;
          box-shadow: ${candidate.sidebarShadow};
        "></span>
      </div>
      <div style="min-width:0;flex:1;">
        <div class="sidebar-title">${candidate.title} (${hue}\u00b0)</div>
        <div class="sidebar-time">2m ago</div>
      </div>
    </div>
  `;
}

function renderAll() {
  const container = document.getElementById('candidates');
  litRender(html`
    ${CANDIDATES.map(c => html`
      <div class="candidate">
        <div class="cand-title">${c.title}</div>
        <div class="cand-desc">${c.desc}</div>

        <div class="row-section">
          <div class="row-label">Sidebar (1.6\u00d7)</div>
          <div class="sidebar-mock">
            ${HUES_IDX.map((hi, i) => makeSidebar(c, hi, i === 0))}
          </div>
        </div>

        <div class="row-section">
          <div class="row-label">Chat \u2014 Busy (3.5\u00d7)</div>
          <div class="blob-row">
            ${HUES_IDX.map(hi => html`
              <div class="blob-cell">
                ${makeBlob(c.shadow, '', hi)}
                <span class="blob-cell-label">${BOBBIT_HUE_ROTATIONS[hi]}\u00b0</span>
              </div>
            `)}
          </div>
        </div>

        <div class="row-section">
          <div class="row-label">Chat \u2014 Idle (3.5\u00d7)</div>
          <div class="blob-row">
            ${HUES_IDX.map(hi => html`
              <div class="blob-cell">
                ${makeBlob(c.shadow, 'bobbit-blob--idle', hi)}
                <span class="blob-cell-label">${BOBBIT_HUE_ROTATIONS[hi]}\u00b0</span>
              </div>
            `)}
          </div>
        </div>
      </div>
    `)}
  `, container);
}

renderAll();
</script>
</body>
</html>
