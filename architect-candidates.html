<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Architect Accessory Candidates</title>
<link rel="stylesheet" href="/src/ui/app.css">
<link rel="stylesheet" href="/src/app/app.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 1.5rem; }
h1 { font-size: 1.2rem; text-align: center; margin-bottom: 0.25rem; }
.subtitle { text-align: center; color: #64748b; font-size: 0.75rem; margin-bottom: 1.5rem; }

.candidates { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
.candidate { background: #1e293b; border-radius: 12px; padding: 1.25rem; min-width: 280px; flex: 1; max-width: 360px; }
.cand-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; }
.cand-desc { font-size: 0.72rem; color: #64748b; margin-bottom: 1rem; }

.row-section { margin-bottom: 1rem; }
.row-label { font-size: 0.65rem; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }

.blob-row { display: flex; gap: 0.75rem; align-items: end; flex-wrap: wrap; }
.blob-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.blob-cell-label { font-size: 0.6rem; color: #475569; }
.blob-wrap {
  position: relative; width: 80px; height: 80px;
  display: flex; align-items: center; justify-content: center;
}
.blob-wrap .bobbit-blob { position: relative; margin: 0 !important; }

.sidebar-mock { background: #111827; border-radius: 8px; padding: 0.4rem; border: 1px solid #1e293b; }
.sidebar-row { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 6px; }
.sidebar-row.active { background: #1e293b; }
.sidebar-title { font-size: 0.75rem; color: #e2e8f0; }
.sidebar-time { font-size: 0.6rem; color: #64748b; }

/* Candidate accessory styles — injected inline since these aren't in app.css yet */
/* They reuse the magnifier pattern: hand-held right side, goes behind on right-facing */
.bobbit-blob__candidate-acc {
  display: block;
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: visible;
  transform-origin: 5px 8px;
  transform: scale(3.5);
  margin: 8px 18px 28px 18px;
  image-rendering: pixelated;
  filter: hue-rotate(calc(-1 * var(--bobbit-hue-rotate, 0deg)));
  animation:
    blob-busy-move-rigid 10s cubic-bezier(0.34, 1, 0.64, 1) infinite,
    magnifier-depth-busy 10s steps(1) infinite;
}
.bobbit-blob--idle .bobbit-blob__candidate-acc {
  animation: magnifier-depth-idle 10s steps(1) infinite;
  transform: scale(3.5) translateX(-7px);
}
</style>
</head>
<body>
<h1>Architect Accessory — 3 Candidates</h1>
<p class="subtitle">Real app.css rendering — sidebar (1.6×) and chat blob (3.5×) at multiple hues</p>

<div class="candidates" id="candidates"></div>

<script type="module">
import { statusBobbit, ACCESSORIES, BOBBIT_HUE_ROTATIONS, sessionHueRotation } from '/src/app/session-colors.ts';
import { html, render as litRender } from '/node_modules/lit/index.js';

const CANDIDATES = [
  {
    key: 'blueprint',
    title: 'A: Blueprint',
    desc: 'Blue page with white architectural line drawings',
    shadow: `
      8px 4px 0 #000, 9px 4px 0 #000, 10px 4px 0 #000, 11px 4px 0 #000, 12px 4px 0 #000,
      8px 5px 0 #000, 9px 5px 0 #1e40af, 10px 5px 0 #fff, 11px 5px 0 #1e3a5f, 12px 5px 0 #000,
      8px 6px 0 #000, 9px 6px 0 #fff, 10px 6px 0 #1e3a5f, 11px 6px 0 #1e3a5f, 12px 6px 0 #000,
      8px 7px 0 #000, 9px 7px 0 #1e3a5f, 10px 7px 0 #1e3a5f, 11px 7px 0 #fff, 12px 7px 0 #000,
      8px 8px 0 #000, 9px 8px 0 #1e40af, 10px 8px 0 #fff, 11px 8px 0 #1e3a5f, 12px 8px 0 #000,
      8px 9px 0 #000, 9px 9px 0 #000, 10px 9px 0 #000, 11px 9px 0 #000, 12px 9px 0 #000
    `
  },
  {
    key: 'setsquare',
    title: 'B: Set Square',
    desc: 'Triangle ruler with cutout hole in centre',
    shadow: `
      12px 4px 0 #000,
      11px 5px 0 #000, 12px 5px 0 #93c5fd, 13px 5px 0 #000,
      10px 6px 0 #000, 11px 6px 0 #bfdbfe, 12px 6px 0 #93c5fd, 13px 6px 0 #000,
      9px 7px 0 #000, 10px 7px 0 #bfdbfe, 11px 7px 0 #000, 12px 7px 0 #bfdbfe, 13px 7px 0 #000,
      8px 8px 0 #000, 9px 8px 0 #bfdbfe, 10px 8px 0 #bfdbfe, 11px 8px 0 #bfdbfe, 12px 8px 0 #93c5fd, 13px 8px 0 #000,
      7px 9px 0 #000, 8px 9px 0 #000, 9px 9px 0 #000, 10px 9px 0 #000, 11px 9px 0 #000, 12px 9px 0 #000, 13px 9px 0 #000
    `
  },
  {
    key: 'northstar',
    title: 'C: North Star',
    desc: 'Guiding star — direction, vision, principled engineering',
    shadow: `
      10px 3px 0 #000,
      10px 4px 0 #000, 11px 4px 0 #fbbf24,
      9px 5px 0 #000, 10px 5px 0 #fde047, 11px 5px 0 #000,
      8px 6px 0 #000, 9px 6px 0 #fbbf24, 10px 6px 0 #fff, 11px 6px 0 #fde047, 12px 6px 0 #fbbf24, 13px 6px 0 #000,
      9px 7px 0 #000, 10px 7px 0 #fde047, 11px 7px 0 #000,
      10px 8px 0 #000, 9px 8px 0 #fbbf24,
      10px 9px 0 #000
    `
  }
];

const HUES_IDX = [0, 5, 12]; // indices into BOBBIT_HUE_ROTATIONS for variety

function makeBlob(shadow, stateClass, hueIdx) {
  const hue = BOBBIT_HUE_ROTATIONS[hueIdx] || 0;
  return html`
    <div class="blob-wrap" style="--bobbit-hue-rotate: ${hue}deg">
      <div class=${'bobbit-blob ' + stateClass} style="filter: hue-rotate(${hue}deg)">
        <div class="bobbit-blob__sprite"></div>
        <div class="bobbit-blob__shadow"></div>
        <div class="bobbit-blob__candidate-acc" style="box-shadow: ${shadow}"></div>
      </div>
    </div>
  `;
}

function makeSidebar(candidate, hueIdx, active) {
  const hue = BOBBIT_HUE_ROTATIONS[hueIdx] || 0;
  const fakeId = `cand-${candidate.key}-${hueIdx}-sidebar`;
  // Use real statusBobbit for the bobbit body, then overlay the candidate accessory
  const bobbit = statusBobbit('streaming', false, fakeId, active, false, false, false, 'none');
  return html`
    <div class="sidebar-row ${active ? 'active' : ''}">
      <div style="position:relative;width:20px;height:16px;flex-shrink:0;">
        ${bobbit}
        <span style="
          position:absolute; left:0; top:0;
          display:block; width:1px; height:1px; overflow:visible;
          transform:scale(1.6); transform-origin:0 0;
          image-rendering:pixelated;
          box-shadow: ${candidate.shadow};
        "></span>
      </div>
      <div style="min-width:0;flex:1;">
        <div class="sidebar-title">${candidate.title} (${hue}°)</div>
        <div class="sidebar-time">2m ago</div>
      </div>
    </div>
  `;
}

function renderAll() {
  const container = document.getElementById('candidates');
  litRender(html`
    ${CANDIDATES.map(c => html`
      <div class="candidate">
        <div class="cand-title">${c.title}</div>
        <div class="cand-desc">${c.desc}</div>

        <div class="row-section">
          <div class="row-label">Sidebar (1.6×)</div>
          <div class="sidebar-mock">
            ${HUES_IDX.map((hi, i) => makeSidebar(c, hi, i === 0))}
          </div>
        </div>

        <div class="row-section">
          <div class="row-label">Chat — Busy (3.5×)</div>
          <div class="blob-row">
            ${HUES_IDX.map(hi => html`
              <div class="blob-cell">
                ${makeBlob(c.shadow, '', hi)}
                <span class="blob-cell-label">${BOBBIT_HUE_ROTATIONS[hi]}°</span>
              </div>
            `)}
          </div>
        </div>

        <div class="row-section">
          <div class="row-label">Chat — Idle (3.5×)</div>
          <div class="blob-row">
            ${HUES_IDX.map(hi => html`
              <div class="blob-cell">
                ${makeBlob(c.shadow, 'bobbit-blob--idle', hi)}
                <span class="blob-cell-label">${BOBBIT_HUE_ROTATIONS[hi]}°</span>
              </div>
            `)}
          </div>
        </div>
      </div>
    `)}
  `, container);
}

renderAll();
</script>
</body>
</html>
