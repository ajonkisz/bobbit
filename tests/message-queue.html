<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
  
  /* Minimal theme variables the components expect */
  :root {
    --background: #1a1a2e;
    --foreground: #e0e0e0;
    --card: #111827;
    --border: #2a2a4a;
    --muted-foreground: #888;
    --primary: #3b82f6;
    --destructive: #ef4444;
    --sidebar: #111827;
  }
  
  #test-area {
    max-width: 600px;
    margin: 0 auto;
  }
  
  #log {
    margin-top: 20px;
    padding: 10px;
    background: #000;
    border-radius: 8px;
    font-family: monospace;
    font-size: 12px;
    max-height: 300px;
    overflow-y: auto;
    white-space: pre-wrap;
  }
  .log-entry { margin: 2px 0; }
  .log-pass { color: #22c55e; }
  .log-fail { color: #ef4444; }
  .log-info { color: #60a5fa; }
</style>
</head>
<body>

<div id="test-area">
  <h2 style="margin-bottom: 16px;">Message Queue Test Fixture</h2>
  <div id="editor-container"></div>
</div>
<div id="log"></div>

<script type="module">
import "/src/ui/components/MessageEditor.ts";

const container = document.getElementById("editor-container");
const logEl = document.getElementById("log");

function log(msg, cls = "log-info") {
  const div = document.createElement("div");
  div.className = `log-entry ${cls}`;
  div.textContent = msg;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

// Create the MessageEditor element
const editor = document.createElement("message-editor");

// Track sends
const sends = [];
editor.onSend = (text, attachments) => {
  sends.push({ text, attachments });
  log(`onSend called: "${text}" (${attachments?.length || 0} attachments)`);
};

// Track steers
const steers = [];
editor.onSteer = (msg) => {
  steers.push(msg);
  log(`onSteer called: "${msg.text}" (id: ${msg.id})`);
};

// Track removes
const removes = [];
editor.onRemoveQueued = (id) => {
  removes.push(id);
  log(`onRemoveQueued called: id=${id}`);
};

editor.isStreaming = false;
container.appendChild(editor);

// Wait for Lit to finish first render
await editor.updateComplete;

// Expose test helpers
window.__editor = editor;
window.__sends = sends;
window.__steers = steers;
window.__removes = removes;

window.__getTextareaValue = () => {
  const ta = editor.renderRoot
    ? editor.renderRoot.querySelector("textarea")
    : editor.querySelector("textarea");
  return ta ? ta.value : null;
};

window.__getTextarea = () => {
  return editor.renderRoot
    ? editor.renderRoot.querySelector("textarea")
    : editor.querySelector("textarea");
};

window.__typeInTextarea = async (text) => {
  const ta = window.__getTextarea();
  if (!ta) throw new Error("No textarea found");
  ta.focus();
  ta.value = text;
  // Fire input event to sync Lit state
  ta.dispatchEvent(new Event("input", { bubbles: true }));
  // Let Lit process the update
  await editor.updateComplete;
};

window.__pressEnter = async () => {
  const ta = window.__getTextarea();
  if (!ta) throw new Error("No textarea found");
  ta.dispatchEvent(new KeyboardEvent("keydown", {
    key: "Enter",
    shiftKey: false,
    bubbles: true,
    cancelable: true,
  }));
  await editor.updateComplete;
};

window.__setStreaming = async (streaming) => {
  editor.isStreaming = streaming;
  await editor.updateComplete;
};

window.__setQueuedMessages = async (messages) => {
  editor.queuedMessages = messages;
  await editor.updateComplete;
};

window.__clearEditorValue = async () => {
  editor.value = "";
  editor.attachments = [];
  await editor.updateComplete;
};

window.__getEditorValue = () => editor.value;

window.__getQueuedMessageElements = () => {
  // The queued messages are rendered as divs with truncate class inside the editor
  const els = editor.querySelectorAll(".font-mono.truncate, span.truncate.font-mono");
  return Array.from(els).map(el => el.textContent);
};

window.__ready = true;
log("Test fixture ready");
</script>

</body>
</html>
