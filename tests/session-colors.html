<!DOCTYPE html>
<html>
<head><title>Session Colors Test</title></head>
<body>
<script>
const BOBBIT_HUE_ROTATIONS = [-110, -85, -60, -35, -10, 0, 15, 25, 40, 50, 65, 75, 100, 125];
const sessionColorMap = new Map();

function nextAvailableColorIndex() {
	const used = new Set(sessionColorMap.values());
	for (let i = 0; i < BOBBIT_HUE_ROTATIONS.length; i++) {
		if (!used.has(i)) return i;
	}
	return sessionColorMap.size % BOBBIT_HUE_ROTATIONS.length;
}

function sessionHueRotation(sessionId) {
	let idx = sessionColorMap.get(sessionId);
	if (idx === undefined) {
		idx = nextAvailableColorIndex();
		sessionColorMap.set(sessionId, idx);
	}
	return BOBBIT_HUE_ROTATIONS[idx];
}

function reset() { sessionColorMap.clear(); }

window.__BOBBIT_HUE_ROTATIONS = BOBBIT_HUE_ROTATIONS;
window.__sessionColorMap = sessionColorMap;
window.__sessionHueRotation = sessionHueRotation;
window.__reset = reset;
</script>
</body>
</html>
