<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  
  .app {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    background: #fff;
  }
  
  #app-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 50;
    background: #fff;
    border-bottom: 1px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
  }

  #app-main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  .chat-panel {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0;
  }
  
  .agent-interface {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0;
  }

  .messages-wrapper {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .scroll-container {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
  }

  .message {
    padding: 16px;
    margin: 8px;
    background: #f0f0f0;
    border-radius: 8px;
  }

  .input-area {
    flex-shrink: 0;
    padding: 8px;
    border-top: 1px solid #ccc;
  }
</style>
</head>
<body>
<div class="app">
  <div id="app-header">
    <span>← Sessions</span>
    <span>Model: Claude</span>
  </div>
  <div id="app-main">
    <div class="chat-panel">
      <div class="agent-interface">
        <div class="messages-wrapper">
          <div class="scroll-container overflow-y-auto" id="scroll-target">
            <div style="padding-top: 0" id="messages-content">
            </div>
          </div>
          <div class="input-area">
            <input type="text" placeholder="Type a message..." style="width: 100%;">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Generate enough messages to enable scrolling
const content = document.getElementById("messages-content");
for (let i = 0; i < 50; i++) {
  const div = document.createElement("div");
  div.className = "message";
  div.textContent = `Message ${i + 1}: Lorem ipsum dolor sit amet, consectetur adipiscing elit.`;
  content.appendChild(div);
}

// Set padding-top on app-main to account for fixed header
function syncMobileHeader() {
  const headerEl = document.getElementById("app-header");
  const mainEl = document.getElementById("app-main");
  if (headerEl && mainEl) {
    mainEl.style.paddingTop = headerEl.offsetHeight + "px";
  }
}

/**
 * Helper for tests — scrolls #scroll-target and dispatches a scroll event.
 */
window.__scrollTo = (top) => {
  const el = document.getElementById("scroll-target");
  if (!el) return;
  el.scrollTop = top;
  el.dispatchEvent(new Event("scroll"));
};

syncMobileHeader();
</script>
</body>
</html>
