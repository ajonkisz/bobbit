<!DOCTYPE html>
<html>
<head>
	<title>Color Migration Test</title>
</head>
<body>
<script>
/**
 * Test fixture for color-store migration logic.
 * Mirrors V1_TO_CURRENT, V2_TO_CURRENT from color-store.ts.
 */

// Migration from original 20-colour palette (v1) to current 17-colour
const V1_TO_CURRENT = [
	0, 1, 2, 3, 4, 5, 6, 7, // 0-7: unchanged
	7,                        // 8 (200°) → 7 (175°)
	7,                        // 9 (225°) → 7 (175°)
	8, 9, 10, 11, 12, 13, 14, 15, 16, // 10-18 → 8-16
	8,                        // 19 (250°) → 8 (-135°)
];

// Migration from intermediate 18-colour palette (v2) to current 17-colour
const V2_TO_CURRENT = [
	0, 1, 2, 3, 4, 5, 6, 7, // 0-7: unchanged
	7,                        // 8 (225°) → 7 (175°)
	8, 9, 10, 11, 12, 13, 14, 15, 16, // 9-17 → 8-16
];

const NEW_PALETTE = [
	0, 25, 50, 75, 100, 125, 150, 175,
	-135, -110, -85, -60, -35, -10, 15, 40, 65,
];

const V1_PALETTE = [
	0, 25, 50, 75, 100, 125, 150, 175, 200, 225,
	-135, -110, -85, -60, -35, -10, 15, 40, 65, 250,
];

const V2_PALETTE = [
	0, 25, 50, 75, 100, 125, 150, 175, 225,
	-135, -110, -85, -60, -35, -10, 15, 40, 65,
];

function migrateIndex(oldIdx, mapping) {
	if (oldIdx >= 0 && oldIdx < mapping.length) return mapping[oldIdx];
	return oldIdx > 16 ? 16 : oldIdx;
}

function migrateColorMap(entries, mapping) {
	const result = {};
	for (const [id, idx] of Object.entries(entries)) {
		result[id] = migrateIndex(idx, mapping);
	}
	return result;
}

window.__V1_TO_CURRENT = V1_TO_CURRENT;
window.__V2_TO_CURRENT = V2_TO_CURRENT;
window.__NEW_PALETTE = NEW_PALETTE;
window.__V1_PALETTE = V1_PALETTE;
window.__V2_PALETTE = V2_PALETTE;
window.__migrateIndex = migrateIndex;
window.__migrateColorMap = migrateColorMap;
</script>
</body>
</html>
