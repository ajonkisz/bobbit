<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Draft Persistence Test Fixture</title>
</head>
<body>
<label>Session ID: <input id="session-id" type="text" value="session-A" /></label>
<br>
<textarea id="editor" rows="4" cols="40"></textarea>
<br>
<button id="send-btn">Send</button>
<div id="status"></div>

<script>
// Replicates MessageEditor draft persistence logic
const DEBOUNCE_MS = 100; // fast for tests (production uses 500ms)
let saveTimer = null;

function draftKey() {
  const sid = document.getElementById('session-id').value;
  return sid ? 'bobbit_draft_' + sid : null;
}

function saveDraft() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const key = draftKey();
    if (!key) return;
    const val = document.getElementById('editor').value;
    if (val) {
      sessionStorage.setItem(key, val);
    } else {
      sessionStorage.removeItem(key);
    }
  }, DEBOUNCE_MS);
}

function restoreDraft() {
  const key = draftKey();
  if (!key) return;
  const draft = sessionStorage.getItem(key);
  const editor = document.getElementById('editor');
  if (draft) {
    editor.value = draft;
  } else {
    editor.value = '';
  }
}

function clearDraft() {
  if (saveTimer) {
    clearTimeout(saveTimer);
    saveTimer = null;
  }
  const key = draftKey();
  if (key) sessionStorage.removeItem(key);
  document.getElementById('editor').value = '';
}

// Wire up textarea input
document.getElementById('editor').addEventListener('input', saveDraft);

// Wire up send button
document.getElementById('send-btn').addEventListener('click', clearDraft);

// Wire up session-id change — save current draft first, then restore new session's draft
document.getElementById('session-id').addEventListener('change', function() {
  restoreDraft();
});

// On load, restore draft for current session
restoreDraft();

// Expose for Playwright
window.__restoreDraft = restoreDraft;
window.__clearDraft = clearDraft;
</script>
</body>
</html>
