<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  .container {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .scroll-container {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    overflow-anchor: none; /* Disable browser CSS scroll anchoring — test JS logic only */
  }

  .message {
    padding: 16px;
    margin: 8px;
    background: #f0f0f0;
    border-radius: 8px;
  }

  .collapsible {
    overflow: hidden;
    background: #d0e0ff;
    transition: none; /* no transition for test — instant shrink */
  }
</style>
</head>
<body>
<div class="container">
  <div class="scroll-container" id="scroll-container">
    <div class="content-wrapper" id="content-wrapper">
      <!-- Content is generated by JS below -->
    </div>
  </div>
</div>

<script>
const wrapper = document.getElementById('content-wrapper');

// Build layout:
// - 10 messages
// - collapsible-1 (400px)
// - 5 messages
// - collapsible-2 (400px)
// - 5 messages
// - collapsible-3 (400px)
// - 5 messages
// - large-collapsible (2000px)
// - final-message (the "latest message")

function addMessages(parent, startIndex, count) {
  for (let i = 0; i < count; i++) {
    const div = document.createElement('div');
    div.className = 'message';
    div.textContent = `Message ${startIndex + i}: Some chat content here.`;
    parent.appendChild(div);
  }
}

function addCollapsible(parent, id, height) {
  const div = document.createElement('div');
  div.className = 'collapsible';
  div.id = id;
  div.style.height = height + 'px';
  div.innerHTML = `<div style="padding: 16px;">Tool output (${id}, ${height}px)</div>`;
  parent.appendChild(div);
  return div;
}

addMessages(wrapper, 1, 10);
addCollapsible(wrapper, 'collapsible-1', 400);
addMessages(wrapper, 11, 5);
addCollapsible(wrapper, 'collapsible-2', 400);
addMessages(wrapper, 16, 5);
addCollapsible(wrapper, 'collapsible-3', 400);
addMessages(wrapper, 21, 5);
addCollapsible(wrapper, 'large-collapsible', 2000);

const finalMsg = document.createElement('div');
finalMsg.className = 'message';
finalMsg.id = 'final-message';
finalMsg.textContent = 'Final message: This is the latest message that should remain visible.';
wrapper.appendChild(finalMsg);

// --- Scroll-anchor logic (mirrors AgentInterface.ts) ---
const scrollContainer = document.getElementById('scroll-container');

let _stickToBottom = true;
let _isAutoScrolling = false;
let _autoScrollTimer;
let _lastScrollHeight = scrollContainer.scrollHeight;
// The resize handler — same logic as the ResizeObserver callback in AgentInterface.ts.
function handleResize() {
  if (!scrollContainer) return;
  const newScrollHeight = scrollContainer.scrollHeight;
  const delta = newScrollHeight - _lastScrollHeight;

  if (delta < 0) {
    // Content shrunk (collapse) — apply post-collapse clamp.
    // Let the browser naturally adjust scrollTop, then check:
    // if bottom of content is above the viewport midpoint, scroll
    // so latest message is at the bottom of the viewport.
    _lastScrollHeight = newScrollHeight;
    const { scrollTop, clientHeight } = scrollContainer;
    const contentBottom = newScrollHeight - scrollTop;
    if (contentBottom < clientHeight / 2) {
      _isAutoScrolling = true;
      scrollContainer.scrollTop = newScrollHeight - clientHeight;
      clearTimeout(_autoScrollTimer);
      _autoScrollTimer = setTimeout(() => { _isAutoScrolling = false; }, 150);
    }
    return;
  }

  if (_stickToBottom) {
    _lastScrollHeight = newScrollHeight;
    _isAutoScrolling = true;
    scrollContainer.scrollTop = scrollContainer.scrollHeight;
    clearTimeout(_autoScrollTimer);
    _autoScrollTimer = setTimeout(() => { _isAutoScrolling = false; }, 150);
  } else {
    _lastScrollHeight = newScrollHeight;
  }
}

// Scroll handler — mirrors AgentInterface.ts _handleScroll.
scrollContainer.addEventListener('scroll', () => {
  if (_isAutoScrolling) return;
  const { scrollTop, scrollHeight, clientHeight } = scrollContainer;
  if (scrollHeight === _lastScrollHeight) {
    _stickToBottom = scrollHeight - scrollTop - clientHeight < 50;
  }
}, { passive: true });

// Expose helpers for the test
window.__scrollTo = (top) => {
  scrollContainer.scrollTop = top;
  const { scrollTop, scrollHeight, clientHeight } = scrollContainer;
  _lastScrollHeight = scrollHeight;
  _stickToBottom = scrollHeight - scrollTop - clientHeight < 50;
};

window.__getState = () => ({
  scrollTop: scrollContainer.scrollTop,
  scrollHeight: scrollContainer.scrollHeight,
  clientHeight: scrollContainer.clientHeight,
  stickToBottom: _stickToBottom,
  lastScrollHeight: _lastScrollHeight,

});

window.__collapseElement = (id) => {
  document.getElementById(id).style.height = '0px';
};

window.__collapseElements = (ids) => {
  ids.forEach(id => { document.getElementById(id).style.height = '0px'; });
};

window.__handleResize = handleResize;
</script>
</body>
</html>
