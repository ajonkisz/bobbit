<!DOCTYPE html>
<html>
<head><title>RemoteAgent message flow test</title></head>
<body>
<script>
/**
 * Simulates the RemoteAgent message state machine to test whether
 * user messages survive all scenarios.
 */

function extractText(message) {
	if (!message) return "";
	if (typeof message === "string") return message;
	if (typeof message.content === "string") return message.content;
	if (Array.isArray(message.content)) {
		return message.content
			.filter(c => c.type === "text")
			.map(c => c.text || "")
			.join("\n");
	}
	return "";
}

function enrichUserMessage(msg) {
	if (msg.role !== "user" || !Array.isArray(msg.content)) return msg;
	const imageChunks = msg.content.filter(c => c.type === "image" && c.data);
	if (imageChunks.length === 0) return msg;
	return { ...msg, role: "user-with-attachments", attachments: imageChunks };
}

let _idCounter = 0;

class FakeRemoteAgent {
	constructor() {
		this.state = {
			messages: [],
			streamMessage: null,
			isStreaming: false,
			pendingToolCalls: new Set(),
		};
		this._deferredAssistantMessage = null;
		this._pendingAttachments = null;
		this._compactionSyntheticMessages = [];
		this._isCompacting = false;
		this._liveEventMessages = [];
	}

	prompt(text, attachments) {
		// Only add optimistic message when agent is idle.
		// If streaming, server queues the prompt and echoes it in order.
		if (!this.state.isStreaming) {
			const optimisticId = `optimistic_${++_idCounter}`;
			const msg = {
				role: attachments ? "user-with-attachments" : "user",
				content: [{ type: "text", text }],
				timestamp: Date.now(),
				id: optimisticId,
				...(attachments ? { attachments } : {}),
			};
			this.state.messages = [...this.state.messages, msg];
			this._liveEventMessages.push(msg);
		}
	}

	flushDeferredMessage() {
		if (this._deferredAssistantMessage) {
			this.state.messages = [...this.state.messages, this._deferredAssistantMessage];
			this.state.streamMessage = null;
			this._deferredAssistantMessage = null;
		}
	}

	handleMessagesResponse(msgs) {
		this.state.messages = msgs.map(enrichUserMessage);

		if (this._liveEventMessages.length > 0) {
			const serverTexts = new Set(
				this.state.messages
					.filter(m => m.role === "user" || m.role === "user-with-attachments")
					.map(m => extractText(m))
			);
			for (const liveMsg of this._liveEventMessages) {
				if (!serverTexts.has(extractText(liveMsg))) {
					this.state.messages = [...this.state.messages, liveMsg];
				}
			}
			this._liveEventMessages = [];
		}

		if (this._compactionSyntheticMessages.length > 0) {
			this.state.messages = [...this.state.messages, ...this._compactionSyntheticMessages];
		}
	}

	handleEvent(event) {
		switch (event.type) {
			case "agent_start":
				this.state.isStreaming = true;
				break;

			case "agent_end":
				this.flushDeferredMessage();
				this.state.isStreaming = false;
				this.state.streamMessage = null;
				this.state.pendingToolCalls = new Set();
				break;

			case "message_update":
				this.flushDeferredMessage();
				if (event.message) this.state.streamMessage = event.message;
				break;

			case "message_end":
				if (event.message) {
					if (event.message.role === "assistant") {
						const hasToolCalls = Array.isArray(event.message.content) &&
							event.message.content.some(c => c.type === "toolCall");
						if (hasToolCalls) {
							this._deferredAssistantMessage = event.message;
						} else {
							this.state.streamMessage = null;
							this.state.messages = [...this.state.messages, event.message];
						}
					} else {
						this.flushDeferredMessage();
						this.state.streamMessage = null;
						let msg = event.message;
						if (msg.role === "user" && this._pendingAttachments) {
							msg = { ...msg, role: "user-with-attachments", attachments: this._pendingAttachments };
							this._pendingAttachments = null;
						}

						// Dedup: replace optimistic message with server echo
						if (msg.role === "user" || msg.role === "user-with-attachments") {
							const msgText = extractText(msg);
							const optimisticIdx = this.state.messages.findIndex(
								m => m.id?.startsWith("optimistic_") && extractText(m) === msgText
							);
							if (optimisticIdx !== -1) {
								const replacedId = this.state.messages[optimisticIdx].id;
								const updated = [...this.state.messages];
								updated[optimisticIdx] = msg;
								this.state.messages = updated;
								this._liveEventMessages = this._liveEventMessages.filter(m => m.id !== replacedId);
								this._liveEventMessages.push(msg);
								break;
							}
						}

						this.state.messages = [...this.state.messages, msg];
						if (msg.role === "user" || msg.role === "user-with-attachments") {
							this._liveEventMessages.push(msg);
						}
					}
				}
				break;
		}
	}
}

const results = [];
function assert(condition, name) {
	results.push({ name, passed: condition });
	if (!condition) console.error("FAIL:", name);
}

// ==========================================
// Test 1: Optimistic — user message appears immediately after prompt()
// ==========================================
{
	const agent = new FakeRemoteAgent();
	agent.prompt("Hello");
	
	const userMsgs = agent.state.messages.filter(m => m.role === "user");
	assert(userMsgs.length === 1, "Optimistic: user message appears immediately");
	assert(extractText(userMsgs[0]) === "Hello", "Optimistic: correct text");
	assert(userMsgs[0].id.startsWith("optimistic_"), "Optimistic: has optimistic_ ID");
}

// ==========================================
// Test 2: Dedup — server echo replaces optimistic message
// ==========================================
{
	const agent = new FakeRemoteAgent();
	agent.prompt("Hello");
	
	// Server echoes user message
	agent.handleEvent({ type: "message_end", message: { role: "user", content: [{ type: "text", text: "Hello" }], id: "server_1" } });
	
	const userMsgs = agent.state.messages.filter(m => m.role === "user");
	assert(userMsgs.length === 1, "Dedup: exactly one user message after echo");
	assert(userMsgs[0].id === "server_1", "Dedup: server ID replaced optimistic ID");
}

// ==========================================
// Test 3: WS dropped — prompt never reaches server, no echo, message persists
// ==========================================
{
	const agent = new FakeRemoteAgent();
	agent.prompt("Lost message");
	
	// No server echo ever arrives. The optimistic message stays.
	agent.handleEvent({ type: "agent_start" });
	// ... agent works on something else or reconnects
	
	const userMsgs = agent.state.messages.filter(m => extractText(m) === "Lost message");
	assert(userMsgs.length === 1, "WS dropped: optimistic message survives with no echo");
}

// ==========================================
// Test 4: Stale messages response — optimistic message re-appended
// ==========================================
{
	const agent = new FakeRemoteAgent();
	agent.prompt("Hello");
	
	// Stale messages response doesn't include the user message
	agent.handleMessagesResponse([]);
	
	const userMsgs = agent.state.messages.filter(m => extractText(m) === "Hello");
	assert(userMsgs.length === 1, "Stale response: optimistic message re-appended");
}

// ==========================================
// Test 5: Server response includes message — no duplicate
// ==========================================
{
	const agent = new FakeRemoteAgent();
	agent.prompt("Hello");
	
	// Server echo arrives first
	agent.handleEvent({ type: "message_end", message: { role: "user", content: [{ type: "text", text: "Hello" }], id: "s1" } });
	
	// Then server messages response also includes it
	agent.handleMessagesResponse([
		{ role: "user", content: [{ type: "text", text: "Hello" }], id: "s1" },
	]);
	
	const userMsgs = agent.state.messages.filter(m => m.role === "user");
	assert(userMsgs.length === 1, "Full sync: no duplicate after echo + refresh");
}

// ==========================================
// Test 6: Queued prompt while streaming — no optimistic for second
// ==========================================
{
	const agent = new FakeRemoteAgent();
	agent.prompt("First");
	assert(agent.state.messages.length === 1, "Queue: first optimistic appears");
	
	// Agent starts streaming (processing first prompt)
	agent.handleEvent({ type: "agent_start" });
	
	// User queues second prompt while agent is streaming
	agent.prompt("Second");
	assert(agent.state.messages.length === 1, "Queue: no optimistic for second (agent streaming)");
	
	// Server echoes first, then response, then second
	agent.handleEvent({ type: "message_end", message: { role: "user", content: [{ type: "text", text: "First" }], id: "s1" } });
	agent.handleEvent({ type: "message_end", message: { role: "assistant", content: [{ type: "text", text: "Response 1" }] } });
	agent.handleEvent({ type: "agent_end" });
	agent.handleEvent({ type: "agent_start" });
	agent.handleEvent({ type: "message_end", message: { role: "user", content: [{ type: "text", text: "Second" }], id: "s2" } });
	
	const msgs = agent.state.messages;
	assert(msgs.length === 3, "Queue: 3 messages (user, assistant, user)");
	assert(extractText(msgs[0]) === "First", "Queue: first message correct");
	assert(msgs[0].id === "s1", "Queue: first deduped to server ID");
	assert(msgs[1].role === "assistant", "Queue: response interleaved");
	assert(extractText(msgs[2]) === "Second", "Queue: second message correct");
}

// ==========================================
// Test 7: Compaction refresh — optimistic survives
// ==========================================
{
	const agent = new FakeRemoteAgent();
	agent.handleMessagesResponse([
		{ role: "user", content: [{ type: "text", text: "Old" }] },
		{ role: "assistant", content: [{ type: "text", text: "Old reply" }] },
	]);
	
	agent.prompt("New message");
	
	// Compaction refresh without the new message
	agent.handleMessagesResponse([
		{ role: "user", content: [{ type: "text", text: "Old" }] },
		{ role: "assistant", content: [{ type: "text", text: "Old reply" }] },
	]);
	
	const newMsgs = agent.state.messages.filter(m => extractText(m) === "New message");
	assert(newMsgs.length === 1, "Compaction: optimistic message preserved");
}

// ==========================================
// Test 8: After successful refresh, tracking cleared
// ==========================================
{
	const agent = new FakeRemoteAgent();
	agent.prompt("Hello");
	
	// Server echo deduplicates
	agent.handleEvent({ type: "message_end", message: { role: "user", content: [{ type: "text", text: "Hello" }], id: "s1" } });
	
	// Refresh includes the message — clears tracking
	agent.handleMessagesResponse([
		{ role: "user", content: [{ type: "text", text: "Hello" }], id: "s1" },
	]);
	
	// Second refresh without message — should NOT re-append (tracking was cleared)
	agent.handleMessagesResponse([]);
	
	assert(agent.state.messages.length === 0, "Cleared tracking: no stale re-append");
}

// ==========================================
// Test 9: Deferred assistant message not affected
// ==========================================
{
	const agent = new FakeRemoteAgent();
	agent.prompt("Hello");
	agent.handleEvent({ type: "message_end", message: { role: "user", content: [{ type: "text", text: "Hello" }], id: "s1" } });
	agent.handleEvent({ type: "agent_start" });
	
	agent.handleEvent({ type: "message_end", message: {
		role: "assistant",
		content: [{ type: "toolCall", id: "t1", name: "bash" }],
	} });
	
	assert(agent._deferredAssistantMessage !== null, "Deferred: assistant message held");
	// 1 user message in state.messages (optimistic was replaced by dedup)
	assert(agent.state.messages.filter(m => m.role === "user").length === 1, "Deferred: user message present");
	
	agent.handleEvent({ type: "message_update", message: { role: "assistant", content: [{ type: "text", text: "result" }] } });
	
	assert(agent._deferredAssistantMessage === null, "Flush: deferred cleared");
	assert(agent.state.messages.length === 2, "Flush: user + assistant in state.messages");
}

// ==========================================
// Test 10: Attachments preserved in optimistic message
// ==========================================
{
	const agent = new FakeRemoteAgent();
	const attachments = [{ type: "image", content: "base64data", mimeType: "image/png" }];
	agent.prompt("With image", attachments);
	
	assert(agent.state.messages[0].role === "user-with-attachments", "Attachments: correct role");
	assert(agent.state.messages[0].attachments.length === 1, "Attachments: present in optimistic message");
}

// Print results
const allPassed = results.every(r => r.passed);
document.title = allPassed ? "PASS" : "FAIL";
window.__TEST_RESULTS = results;
</script>
</body>
</html>
