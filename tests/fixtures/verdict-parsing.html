<!DOCTYPE html>
<html>
<head><title>Verdict Parsing Tests</title></head>
<body>
<script>
// Inline copy of parseVerdict regex logic from verification-harness.ts
function parseVerdict(output) {
	const match = output.match(/<verdict>\s*(pass|fail)\s*<\/verdict>/i);
	if (!match) return null;
	return match[1].toLowerCase() === "pass";
}

const results = {};

// Basic pass
results.basic_pass = parseVerdict("<verdict>pass</verdict>") === true;

// Basic fail
results.basic_fail = parseVerdict("<verdict>fail</verdict>") === false;

// Whitespace inside tags
results.whitespace_pass = parseVerdict("<verdict> pass </verdict>") === true;

// Case insensitive — PASS
results.case_upper_pass = parseVerdict("<verdict>PASS</verdict>") === true;

// Case insensitive — FAIL
results.case_upper_fail = parseVerdict("<verdict>FAIL</verdict>") === false;

// No verdict tag
results.no_tag = parseVerdict("This text has no verdict at all.") === null;

// Empty string
results.empty_string = parseVerdict("") === null;

// Invalid value
results.invalid_value = parseVerdict("<verdict>maybe</verdict>") === null;

// Multiple verdict tags — first wins
results.multiple_tags = parseVerdict("<verdict>pass</verdict> some text <verdict>fail</verdict>") === true;

// Verdict embedded in larger text with review wrapper
results.embedded_in_review = parseVerdict(
	"<review>\n# Code Review: Design quality\n\n## Summary\nLooks good.\n\n## Findings\n[low] minor.ts:5 — Typo\n\n## Verdict\nApproved.\n\n<verdict>pass</verdict>\n</review>"
) === true;

// Mixed case tag
results.mixed_case = parseVerdict("<verdict>Pass</verdict>") === true;

// Verdict with surrounding whitespace in text
results.surrounded_by_text = parseVerdict("blah blah <verdict>fail</verdict> more text") === false;

window.testResults = results;
</script>
</body>
</html>
