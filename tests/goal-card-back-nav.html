<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Card Back Navigation Test</title>
<style>
body { margin: 0; font-family: sans-serif; background: #0a0a0a; color: #e4e4e7; }
.landing { padding: 16px; }
.goal-card { border: 1px solid #333; border-radius: 8px; margin-bottom: 12px; }
.goal-header { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.goal-title { font-size: 14px; font-weight: 600; flex: 1; }
.goal-body { border-top: 1px solid #333; padding: 8px 16px 16px; }
.session-card { border: 1px solid #444; border-radius: 6px; padding: 12px; margin-bottom: 6px; cursor: pointer; }
.session-card:hover { border-color: #666; }
.chevron { font-size: 12px; color: #888; }
.hidden { display: none; }
#current-view { position: fixed; top: 0; left: 0; right: 0; background: #1a1a1a; padding: 8px 16px; font-size: 12px; z-index: 10; border-bottom: 1px solid #333; }
.view { display: none; }
.view.active { display: block; }
.dashboard-btn { font-size: 11px; color: #888; background: none; border: 1px solid #444; border-radius: 4px; padding: 2px 8px; cursor: pointer; }
</style>
</head>
<body>

<div id="current-view">View: <span id="view-label">landing</span> | Hash: <span id="hash-label">#/</span></div>

<div id="view-landing" class="view active" style="padding-top: 40px;">
  <div class="landing">
    <h2>Goals &amp; Sessions</h2>

    <div class="goal-card" id="goal-card-1">
      <div class="goal-header" id="goal-header-1" data-goal-id="goal-1">
        <span class="chevron" id="chevron-1">▸</span>
        <span class="goal-title">Test Goal Alpha</span>
      </div>
      <div class="goal-body hidden" id="goal-body-1">
        <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
          <button class="dashboard-btn" id="dashboard-btn-1">Dashboard</button>
        </div>
        <div class="session-card" id="session-card-tl" data-session-id="session-tl-1">
          <div>Team Lead: Petra</div>
          <div style="font-size:11px;color:#888">streaming</div>
        </div>
        <div class="session-card" id="session-card-c1" data-session-id="session-c1">
          <div>Coder: Ziggy</div>
          <div style="font-size:11px;color:#888">idle</div>
        </div>
      </div>
    </div>

    <div class="goal-card" id="goal-card-2">
      <div class="goal-header" id="goal-header-2" data-goal-id="goal-2">
        <span class="chevron" id="chevron-2">▸</span>
        <span class="goal-title">Test Goal Beta</span>
      </div>
      <div class="goal-body hidden" id="goal-body-2">
        <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
          <button class="dashboard-btn" id="dashboard-btn-2">Dashboard</button>
        </div>
        <p style="font-size:12px;color:#888">No sessions yet</p>
      </div>
    </div>
  </div>
</div>

<div id="view-goal-dashboard" class="view" style="padding-top: 40px;">
  <div class="landing">
    <h2 id="dashboard-title">Goal Dashboard</h2>
    <div class="session-card" id="dashboard-session-tl" data-session-id="session-tl-1">
      <div>Team Lead: Petra</div>
      <div style="font-size:11px;color:#888">streaming</div>
    </div>
  </div>
</div>

<div id="view-session" class="view" style="padding-top: 40px;">
  <div class="landing">
    <h2 id="session-view-title">Session Chat</h2>
    <p>Connected to session <span id="connected-session-id"></span></p>
  </div>
</div>

<script>
// ============================================================
// Routing
// ============================================================
function getRouteFromHash() {
  const hash = window.location.hash || "";
  const sessionMatch = hash.match(/^#\/session\/([a-z0-9-]+)$/i);
  if (sessionMatch) return { view: "session", sessionId: sessionMatch[1] };
  const goalMatch = hash.match(/^#\/goal\/([a-z0-9-]+)$/i);
  if (goalMatch) return { view: "goal-dashboard", goalId: goalMatch[1] };
  return { view: "landing" };
}

function setHashRoute(view, id, replace) {
  let newHash;
  if (view === "session" && id) newHash = "#/session/" + id;
  else if (view === "goal-dashboard" && id) newHash = "#/goal/" + id;
  else newHash = "#/";
  if (window.location.hash !== newHash) {
    if (replace) {
      history.replaceState({}, "", newHash);
      window.dispatchEvent(new HashChangeEvent("hashchange"));
    } else {
      window.location.hash = newHash;
    }
  }
}

// ============================================================
// View switching
// ============================================================
let connectedSessionId = null;
let connectingSessionId = null;

function showView(viewName) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  const el = document.getElementById("view-" + viewName);
  if (el) el.classList.add("active");
  document.getElementById("view-label").textContent = viewName;
  document.getElementById("hash-label").textContent = window.location.hash || "#/";
}

function handleHashChange() {
  const route = getRouteFromHash();
  document.getElementById("hash-label").textContent = window.location.hash || "#/";

  if (route.view === "session" && route.sessionId) {
    connectedSessionId = route.sessionId;
    document.getElementById("connected-session-id").textContent = route.sessionId;
    showView("session");
  } else if (route.view === "goal-dashboard" && route.goalId) {
    connectedSessionId = null;
    document.getElementById("dashboard-title").textContent = "Goal Dashboard: " + route.goalId;
    showView("goal-dashboard");
  } else {
    connectedSessionId = null;
    showView("landing");
  }
}

window.addEventListener("hashchange", handleHashChange);

// ============================================================
// connectToSession
// ============================================================
async function connectToSession(sessionId) {
  if (connectingSessionId) return;
  connectingSessionId = sessionId;
  const startingRoute = getRouteFromHash();

  await new Promise(r => setTimeout(r, 50));

  connectedSessionId = sessionId;
  connectingSessionId = null;

  const currentRoute = getRouteFromHash();
  const replaceHistory = startingRoute.view === "goal-dashboard" || currentRoute.view === "goal-dashboard";
  setHashRoute("session", sessionId, replaceHistory);
}

// ============================================================
// Goal card expand/collapse (mirrors new mobile design)
// ============================================================
const expandedGoals = new Set();

document.querySelectorAll(".goal-header").forEach(header => {
  header.addEventListener("click", () => {
    const goalId = header.dataset.goalId;
    const body = document.getElementById("goal-body-" + goalId.split("-")[1]);
    const chevron = document.getElementById("chevron-" + goalId.split("-")[1]);
    if (expandedGoals.has(goalId)) {
      expandedGoals.delete(goalId);
      body.classList.add("hidden");
      chevron.textContent = "▸";
    } else {
      expandedGoals.add(goalId);
      body.classList.remove("hidden");
      chevron.textContent = "▾";
    }
  });
});

// Dashboard buttons — explicit navigation to goal dashboard
document.querySelectorAll(".dashboard-btn").forEach(btn => {
  btn.addEventListener("click", (e) => {
    e.stopPropagation();
    const goalId = btn.closest(".goal-card").querySelector(".goal-header").dataset.goalId;
    setHashRoute("goal-dashboard", goalId);
  });
});

// Session card clicks → connect directly
document.querySelectorAll(".session-card").forEach(card => {
  card.addEventListener("click", () => {
    const sessionId = card.dataset.sessionId;
    connectToSession(sessionId);
  });
});

// Expose for testing
window.__connectToSession = connectToSession;
window.__expandedGoals = expandedGoals;

// Initialize
if (window.location.hash && window.location.hash !== "#/") {
  handleHashChange();
}
</script>
</body>
</html>
