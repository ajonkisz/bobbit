<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Role Manager — Redesigned List View</title>
<style>
  /* ========================================================================
   * RESET & DARK THEME (matches Bobbit's HSL custom property palette)
   * ======================================================================== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --background:    222 47% 8%;
    --foreground:    210 40% 92%;
    --secondary:     217 33% 14%;
    --border:        217 33% 18%;
    --muted-fg:      215 20% 55%;
    --accent:        217 33% 17%;
    --ring:          213 94% 58%;
    --destructive:   0 84% 60%;
    --font-mono:     'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: hsl(var(--background));
    color: hsl(var(--foreground));
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ========================================================================
   * PAGE CONTAINER
   * ======================================================================== */
  .roles-container {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ========================================================================
   * STICKY NAV BAR — unchanged from current design
   * ======================================================================== */
  .roles-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid hsl(var(--border));
    background: hsl(var(--background));
    position: sticky;
    top: 0;
    z-index: 10;
    gap: 12px;
  }

  .roles-nav-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .roles-nav-right {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .roles-back {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: hsl(var(--muted-fg));
    cursor: pointer;
    transition: background 150ms, color 150ms;
  }
  .roles-back:hover {
    background: hsl(var(--secondary));
    color: hsl(var(--foreground));
  }

  .roles-title {
    font-size: 16px;
    font-weight: 600;
    margin: 0;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid hsl(var(--border));
    background: hsl(var(--secondary));
    color: hsl(var(--foreground));
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 150ms, border-color 150ms;
    white-space: nowrap;
  }
  .btn:hover {
    background: hsl(var(--accent));
    border-color: hsl(var(--muted-fg) / 0.4);
  }

  /* ========================================================================
   * BODY / LIST
   * ======================================================================== */
  .roles-body {
    flex: 1;
    padding: 16px 20px;
  }

  .roles-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-width: 720px;
  }

  /* ========================================================================
   * ROLE ROW
   * Subtle card-like rows with slight background lift from the page.
   * ======================================================================== */
  .role-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 16px;
    background: hsl(var(--secondary));
    border: 1px solid hsl(var(--border));
    border-radius: 8px;
    transition: background 150ms, border-color 150ms;
  }
  .role-row:hover {
    background: hsl(var(--accent));
    border-color: hsl(var(--muted-fg) / 0.3);
  }

  /* --- Avatar cell --- */
  .role-avatar {
    flex-shrink: 0;
    width: 28px;
    height: 19px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Pixel-art Bobbit sprite via CSS box-shadow, scale 1.6 */
  .bobbit-sprite {
    position: absolute;
    left: 0;
    top: 0;
    display: block;
    width: 1px;
    height: 1px;
    image-rendering: pixelated;
    transform: scale(1.6);
    transform-origin: 0 0;
    filter: saturate(0.4); /* idle state */
  }
  .bobbit-accessory {
    position: absolute;
    left: 0;
    display: block;
    width: 1px;
    height: 1px;
    image-rendering: pixelated;
    transform: scale(1.6);
    transform-origin: 0 0;
  }

  /* --- Label cell --- */
  .role-label {
    flex: 1;
    min-width: 0;
    font-size: 14px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* --- Action buttons --- */
  .role-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .icon-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: hsl(var(--muted-fg));
    cursor: pointer;
    transition: background 150ms, color 150ms;
  }
  .icon-btn:hover {
    background: hsl(var(--secondary));
    color: hsl(var(--foreground));
  }
  .icon-btn.delete:hover {
    background: hsl(var(--destructive) / 0.12);
    color: hsl(var(--destructive));
  }

  /* ========================================================================
   * EMPTY STATE (kept from original)
   * ======================================================================== */
  .roles-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: hsl(var(--muted-fg));
    font-size: 14px;
    padding: 80px 0;
  }

  /* ========================================================================
   * RESPONSIVE
   * ======================================================================== */
  @media (max-width: 640px) {
    .roles-nav { padding: 10px 14px; }
    .roles-body { padding: 12px 14px; }
    .role-row { padding: 10px 12px; gap: 10px; }
    .role-label { font-size: 13px; }
  }

  /* ========================================================================
   * INLINE SVG ICONS (Lucide)
   * ======================================================================== */
  .lucide { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

  /* ========================================================================
   * ANNOTATION BANNER (mockup-only)
   * ======================================================================== */
  .mockup-banner {
    background: hsl(213 94% 58% / 0.1);
    border-bottom: 1px solid hsl(213 94% 58% / 0.25);
    padding: 10px 20px;
    font-size: 12px;
    color: hsl(213 94% 70%);
    text-align: center;
  }
</style>
</head>
<body>

<!-- Mockup annotation -->
<div class="mockup-banner">
  Mockup: Role Manager List View Redesign — no summary stats bar, clean list rows with avatar + name + edit + delete
</div>

<div class="roles-container">

  <!-- ====================================================================
       STICKY NAV BAR (kept from current design)
       ==================================================================== -->
  <div class="roles-nav">
    <div class="roles-nav-left">
      <button class="roles-back" title="Back to sessions">
        <!-- Lucide ArrowLeft -->
        <svg class="lucide" viewBox="0 0 24 24"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      </button>
      <h1 class="roles-title">Roles</h1>
    </div>
    <div class="roles-nav-right">
      <button class="btn">
        <svg class="lucide" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        New Role
      </button>
    </div>
  </div>

  <!-- ====================================================================
       LIST VIEW — replaces card grid + stats bar
       ==================================================================== -->
  <div class="roles-body">
    <div class="roles-list" id="role-list">
      <!-- Rows injected by JS below -->
    </div>
  </div>

</div>

<script>
// ============================================================================
// Bobbit pixel-art sprite data (same box-shadow technique as production)
// ============================================================================

// Canonical green palette (idle)
const P = { main: '#8ec63f', light: '#b5d98a', dark: '#6b9930', eye: '#1a3010' };

const BOBBIT_SHADOW = `
  3px 0px 0 #000,4px 0px 0 #000,5px 0px 0 #000,6px 0px 0 #000,7px 0px 0 #000,
  2px 1px 0 #000,3px 1px 0 ${P.main},4px 1px 0 ${P.main},5px 1px 0 ${P.main},6px 1px 0 ${P.light},7px 1px 0 ${P.light},8px 1px 0 #000,
  1px 2px 0 #000,2px 2px 0 ${P.main},3px 2px 0 ${P.main},4px 2px 0 ${P.main},5px 2px 0 ${P.main},6px 2px 0 ${P.main},7px 2px 0 ${P.light},8px 2px 0 ${P.main},9px 2px 0 #000,
  0px 3px 0 #000,1px 3px 0 ${P.main},2px 3px 0 ${P.main},3px 3px 0 ${P.main},4px 3px 0 ${P.main},5px 3px 0 ${P.main},6px 3px 0 ${P.main},7px 3px 0 ${P.main},8px 3px 0 ${P.main},9px 3px 0 #000,
  0px 4px 0 #000,1px 4px 0 ${P.main},2px 4px 0 ${P.main},3px 4px 0 ${P.eye},4px 4px 0 ${P.main},5px 4px 0 ${P.main},6px 4px 0 ${P.eye},7px 4px 0 ${P.main},8px 4px 0 ${P.main},9px 4px 0 #000,
  0px 5px 0 #000,1px 5px 0 ${P.main},2px 5px 0 ${P.main},3px 5px 0 ${P.eye},4px 5px 0 ${P.main},5px 5px 0 ${P.main},6px 5px 0 ${P.eye},7px 5px 0 ${P.main},8px 5px 0 ${P.main},9px 5px 0 #000,
  0px 6px 0 #000,1px 6px 0 ${P.dark},2px 6px 0 ${P.main},3px 6px 0 ${P.main},4px 6px 0 ${P.main},5px 6px 0 ${P.main},6px 6px 0 ${P.main},7px 6px 0 ${P.main},8px 6px 0 ${P.main},9px 6px 0 #000,
  1px 7px 0 #000,2px 7px 0 ${P.dark},3px 7px 0 ${P.main},4px 7px 0 ${P.main},5px 7px 0 ${P.main},6px 7px 0 ${P.main},7px 7px 0 ${P.main},8px 7px 0 #000,
  2px 8px 0 #000,3px 8px 0 #000,4px 8px 0 #000,5px 8px 0 #000,6px 8px 0 #000,7px 8px 0 #000
`;

// Accessories (copied from session-colors.ts)
const ACCESSORIES = {
  none: { shadow: '', top: '0', addsHeight: false },
  crown: {
    shadow: `
      2px -4px 0 #000,4px -4px 0 #000,7px -4px 0 #000,
      2px -3px 0 #fbbf24,4px -3px 0 #fbbf24,7px -3px 0 #fbbf24,
      2px -2px 0 #fbbf24,3px -2px 0 #fbbf24,4px -2px 0 #fbbf24,5px -2px 0 #fbbf24,6px -2px 0 #fbbf24,7px -2px 0 #fbbf24,
      2px -1px 0 #f59e0b,3px -1px 0 #fbbf24,4px -1px 0 #f59e0b,5px -1px 0 #fbbf24,6px -1px 0 #f59e0b,7px -1px 0 #fbbf24,
      2px -3px 0 #000,4px -3px 0 #000,7px -3px 0 #000,
      2px -4px 0 #fbbf24,4px -4px 0 #fbbf24,7px -4px 0 #fbbf24
    `,
    top: '0',
    addsHeight: true,
  },
  bandana: {
    shadow: `
      0 4px 0 #000,1px 4px 0 #dc2626,2px 4px 0 #000,8px 4px 0 #000,9px 4px 0 #dc2626,10px 4px 0 #000,
      1px 5px 0 #000,2px 5px 0 #000,8px 5px 0 #000,9px 5px 0 #000
    `,
    top: '0',
    addsHeight: false,
  },
  pencil: {
    shadow: `
      9px -2px 0 #000,10px -2px 0 #000,
      8px -1px 0 #000,9px -1px 0 #fde047,10px -1px 0 #fbbf24,11px -1px 0 #000,
      7px 0 0 #000,8px 0 0 #fde047,9px 0 0 #fbbf24,10px 0 0 #000,
      6px 1px 0 #000,7px 1px 0 #fde047,8px 1px 0 #fbbf24,9px 1px 0 #000,
      5px 2px 0 #000,6px 2px 0 #fde047,7px 2px 0 #000,
      4px 3px 0 #000,5px 3px 0 #f4a460,6px 3px 0 #000,
      3px 4px 0 #000,4px 4px 0 #2d2d2d,5px 4px 0 #000
    `,
    top: '0',
    addsHeight: false,
  },
  glasses: {
    shadow: `
      2px 2px 0 #000,3px 2px 0 #000,4px 2px 0 #000,5px 2px 0 #000,6px 2px 0 #000,7px 2px 0 #000,8px 2px 0 #000,
      1px 3px 0 #000,2px 3px 0 #e0e7ff,3px 3px 0 #c7d2fe,4px 3px 0 #000,5px 3px 0 #4b5563,6px 3px 0 #000,7px 3px 0 #e0e7ff,8px 3px 0 #c7d2fe,9px 3px 0 #000,
      1px 4px 0 #000,2px 4px 0 #c7d2fe,3px 4px 0 #e0e7ff,4px 4px 0 #000,6px 4px 0 #000,7px 4px 0 #c7d2fe,8px 4px 0 #e0e7ff,9px 4px 0 #000,
      2px 5px 0 #000,3px 5px 0 #000,4px 5px 0 #000,7px 5px 0 #000,8px 5px 0 #000,9px 5px 0 #000,
      0 3px 0 #000,10px 3px 0 #000,0 4px 0 #4b5563,10px 4px 0 #4b5563,11px 4px 0 #000
    `,
    top: '0',
    addsHeight: false,
  },
  shield: {
    shadow: `
      3px -1px 0 #000,4px -1px 0 #000,5px -1px 0 #000,6px -1px 0 #000,7px -1px 0 #000,
      2px 0 0 #000,3px 0 0 #6b7280,4px 0 0 #9ca3af,5px 0 0 #d1d5db,6px 0 0 #9ca3af,7px 0 0 #6b7280,8px 0 0 #000,
      2px 1px 0 #000,3px 1px 0 #9ca3af,4px 1px 0 #d1d5db,5px 1px 0 #f3f4f6,6px 1px 0 #d1d5db,7px 1px 0 #9ca3af,8px 1px 0 #000,
      2px 2px 0 #000,3px 2px 0 #6b7280,4px 2px 0 #9ca3af,5px 2px 0 #d1d5db,6px 2px 0 #9ca3af,7px 2px 0 #6b7280,8px 2px 0 #000,
      3px 3px 0 #000,4px 3px 0 #6b7280,5px 3px 0 #9ca3af,6px 3px 0 #6b7280,7px 3px 0 #000,
      4px 4px 0 #000,5px 4px 0 #6b7280,6px 4px 0 #000,
      5px 5px 0 #000
    `,
    top: '0',
    addsHeight: false,
  },
  book: {
    shadow: `
      2px 0 0 #000,3px 0 0 #000,4px 0 0 #000,5px 0 0 #000,6px 0 0 #000,7px 0 0 #000,
      1px 1px 0 #000,2px 1px 0 #3b82f6,3px 1px 0 #60a5fa,4px 1px 0 #60a5fa,5px 1px 0 #60a5fa,6px 1px 0 #60a5fa,7px 1px 0 #3b82f6,8px 1px 0 #000,
      1px 2px 0 #000,2px 2px 0 #2563eb,3px 2px 0 #f5f5f5,4px 2px 0 #d4d4d4,5px 2px 0 #f5f5f5,6px 2px 0 #d4d4d4,7px 2px 0 #2563eb,8px 2px 0 #000,
      1px 3px 0 #000,2px 3px 0 #3b82f6,3px 3px 0 #60a5fa,4px 3px 0 #60a5fa,5px 3px 0 #60a5fa,6px 3px 0 #60a5fa,7px 3px 0 #3b82f6,8px 3px 0 #000,
      2px 4px 0 #000,3px 4px 0 #000,4px 4px 0 #000,5px 4px 0 #000,6px 4px 0 #000,7px 4px 0 #000
    `,
    top: '0',
    addsHeight: false,
  },
};

// Hue rotations from the Aurora Borealis palette
const HUES = [0, 25, 50, 75, 100, 125, 150, 175, 200, 225, -135, -110, -85, -60, -35, -10, 15, 40, 65, 250];

// Example roles to render
const ROLES = [
  { label: 'Team Lead',           accessory: 'crown',   hueIdx: 0 },
  { label: 'Coder',               accessory: 'bandana', hueIdx: 2 },
  { label: 'Documentation Writer',accessory: 'pencil',  hueIdx: 5 },
  { label: 'Security Reviewer',   accessory: 'shield',  hueIdx: 8 },
  { label: 'Researcher',          accessory: 'glasses', hueIdx: 11 },
  { label: 'Librarian',           accessory: 'book',    hueIdx: 14 },
];

// Build the list
const list = document.getElementById('role-list');

ROLES.forEach(role => {
  const hue = HUES[role.hueIdx];
  const acc = ACCESSORIES[role.accessory] || ACCESSORIES.none;
  const hasAcc = acc.shadow.trim().length > 0;
  const addsHeight = acc.addsHeight;

  // Container heights
  const containerH = addsHeight ? '19px' : '15px';
  const innerTop = addsHeight ? '4px' : '0';

  // Hue filter on the body sprite
  const bodyFilter = hue ? `filter: hue-rotate(${hue}deg) saturate(0.4);` : 'filter: saturate(0.4);';
  // Accessory counter-rotates to keep its own colours
  const accFilter = hue ? `filter: hue-rotate(${-hue}deg);` : '';

  const row = document.createElement('div');
  row.className = 'role-row';
  row.innerHTML = `
    <div class="role-avatar" style="height:${containerH}">
      <span class="bobbit-sprite" style="top:${innerTop};box-shadow:${BOBBIT_SHADOW};${bodyFilter}"></span>
      ${hasAcc ? `<span class="bobbit-accessory" style="top:${addsHeight ? '0' : innerTop};box-shadow:${acc.shadow};${accFilter}"></span>` : ''}
    </div>
    <span class="role-label">${role.label}</span>
    <div class="role-actions">
      <button class="icon-btn" title="Edit role">
        <svg class="lucide" viewBox="0 0 24 24"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
      </button>
      <button class="icon-btn delete" title="Delete role">
        <svg class="lucide" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
      </button>
    </div>
  `;
  list.appendChild(row);
});
</script>

</body>
</html>
