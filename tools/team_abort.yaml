name: team_abort
description: "Force-abort a stuck agent that won't respond to steering"
summary: "Force-abort a stuck agent that won't respond to steering."
provider:
  type: bobbit-extension
  extension: team-lead-tools.ts
group: Team
renderer: src/ui/tools/renderers/TeamToolRenderers.ts
docs: |
  Force-abort a stuck agent that won't respond to steering. This is a last
  resort — prefer `team_steer` for normal course corrections.

  Parameters:
  - `session_id` (required): Session ID of the agent to abort

  The agent's current turn is killed immediately.
