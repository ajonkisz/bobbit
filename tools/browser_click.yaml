name: browser_click
description: "Click an element by CSS selector"
summary: "Click an element in the headless browser by CSS selector."
provider:
  type: user-extension
  extension: playwright/index.ts
group: Browser
renderer: src/ui/tools/renderers/BrowserClickRenderer.ts
docs: |
  Click on a DOM element identified by a CSS selector. Simulates a full mouse
  click on the first matching element. Any navigation or JS event handlers
  triggered by the click happen automatically.

  Parameters:
  - `selector` (required): CSS selector of the element to click

  The element must be visible and clickable. Use `browser_wait` first if the
  element loads asynchronously. Only the first matching element is clicked.
