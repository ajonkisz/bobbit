name: edit
description: "Replace exact text in a file"
group: File System
renderer: src/ui/tools/renderers/EditRenderer.ts
docs: |
  Edit a file by replacing exact text. The `oldText` must match exactly (including
  whitespace and newlines). Use this for precise, surgical edits to existing files.

  **All paths must use forward slashes (`/`), even on Windows.** Never use backslashes.

  Parameters:
  - `path` (required): Path to the file (relative or absolute, forward slashes only)
  - `oldText` (required): Exact text to find and replace (must match exactly)
  - `newText` (required): New text to replace the old text with

  Examples — correct:
  ```
  edit("src/server/server.ts", oldText, newText)
  edit("src/app/main.ts", 'const x = 1;', 'const x = 2;')
  edit("C:/Users/jsubr/w/bobbit/src/server/cli.ts", old, new)
  ```

  Examples — WRONG (backslashes):
  ```
  edit("src\\server\\server.ts", oldText, newText)         # WRONG
  edit("C:\\Users\\jsubr\\w\\bobbit\\src\\server\\cli.ts", old, new)  # WRONG
  ```
