name: workflow
description: "Manage structured multi-phase workflows"
summary: "Run structured workflows with phases, artifact collection, and report generation."
group: Agent
provider:
  type: user-extension
  extension: workflow.ts
docs: |
  Manage workflow execution: list workflows, start/advance/complete them, collect
  artifacts, generate reports, and run delegated phases.

  Actions: list, start, status, advance, run_phase, reset, collect_artifact,
  set_context, complete, fail, cancel, synthesise_review.

  Parameters:
  - `action` (required): The workflow action to perform
  - `workflow_id` (optional): Workflow ID (required for 'start')
  - `phase_id` (optional): Phase ID (required for 'reset')
  - `name` (optional): Artifact name (required for 'collect_artifact')
  - `content` (optional): Artifact content (required for 'collect_artifact')
  - `key` (optional): Context key (required for 'set_context')
  - `value` (optional): Context value (required for 'set_context')
  - `reason` (optional): Failure reason (for 'fail')
