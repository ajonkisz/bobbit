name: task_update
description: "Update task fields, assignment, or state"
summary: "Update task fields, assignment, or state (todo, in-progress, complete, blocked)."
provider:
  type: bobbit-extension
  extension: goal-tools.ts
group: Tasks
renderer: src/ui/tools/renderers/TaskToolRenderers.ts
docs: |
  Update a task's fields, assignment, or state. Any combination of fields
  can be updated in a single call.

  Parameters:
  - `task_id` (required): ID of the task to update
  - `state` (optional): New state (todo, in-progress, complete, blocked, skipped)
  - `assigned_to` (optional): Session ID to assign the task to
  - `title` (optional): Updated task title
  - `spec` (optional): Updated task specification
  - `result_summary` (optional): Summary of the task result
