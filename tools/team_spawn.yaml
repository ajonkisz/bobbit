name: team_spawn
description: "Spawn a role agent with its own worktree"
summary: "Spawn a role agent (coder, reviewer, tester) with its own git worktree."
provider:
  type: bobbit-extension
  extension: team-lead-tools.ts
group: Team
renderer: src/ui/tools/renderers/TeamToolRenderers.ts
docs: |
  Spawn a new team agent with a specific role and its own git worktree.
  The agent runs as an independent session that can be prompted and steered.

  Parameters:
  - `role` (required): Agent role (coder, reviewer, tester, or custom role name)
  - `task` (optional): Initial task description for the agent
  - `personality` (optional): Personality to apply to the agent

  Returns the spawned agent's session ID. Use `team_prompt` to send work.
