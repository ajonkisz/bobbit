name: artifact_create
description: "Create a goal artifact (design doc, findings, etc.)"
summary: "Create a goal artifact (design-doc, test-plan, review-findings, etc.)."
provider:
  type: bobbit-extension
  extension: goal-tools.ts
group: Artifacts
renderer: src/ui/tools/renderers/ArtifactToolRenderers.ts
docs: |
  Create a new goal artifact such as a design doc, test plan, or review findings.
  Artifacts are versioned documents attached to the current goal.

  Parameters:
  - `name` (required): Human-readable artifact name
  - `type` (required): Artifact type (design-doc, test-plan, review-findings, gap-analysis, security-findings, custom)
  - `content` (required): Full content of the artifact (markdown)

  Returns the created artifact with its ID and version number (starts at v1).
