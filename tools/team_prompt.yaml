name: team_prompt
description: "Send a prompt to a team agent (queued or immediate)"
summary: "Send a prompt to a team agent, queued or immediate."
provider:
  type: bobbit-extension
  extension: team-lead-tools.ts
group: Team
renderer: src/ui/tools/renderers/TeamToolRenderers.ts
docs: |
  Send a prompt to a team agent. If the agent is idle, the prompt is dispatched
  immediately. If it's busy, the prompt is queued with priority sorting.

  Parameters:
  - `session_id` (required): Session ID of the target agent
  - `message` (required): Prompt message to send
  - `priority` (optional): Queue priority (higher = sooner)
