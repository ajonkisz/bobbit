name: web_search
description: "Search the web via DuckDuckGo"
summary: "Search the web via DuckDuckGo. Returns titles, URLs, and snippets."
provider:
  type: user-extension
  extension: web-research.ts
group: Web
renderer: src/ui/tools/renderers/WebSearchRenderer.ts
docs: |
  Search the web using DuckDuckGo. Returns results with titles, URLs, and
  snippets. No API key needed — works by scraping DuckDuckGo's HTML results.

  Parameters:
  - `query` (required): Search query (natural language or keywords)
  - `maxResults` (optional): Maximum results to return, 1-20 (default: 10)

  Launch multiple parallel searches with different phrasings for best coverage.
  Follow up with `web_fetch` to read full page content from result URLs.
