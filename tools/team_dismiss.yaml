name: team_dismiss
description: "Terminate an agent and clean up"
summary: "Terminate a team agent and clean up its worktree."
provider:
  type: bobbit-extension
  extension: team-lead-tools.ts
group: Team
renderer: src/ui/tools/renderers/TeamToolRenderers.ts
docs: |
  Terminate a team agent and clean up its git worktree. The agent's session
  is destroyed and cannot be recovered.

  Parameters:
  - `session_id` (required): Session ID of the agent to dismiss
