name: artifact_list
description: "List all goal artifacts"
summary: "List all goal artifacts (design docs, test plans, findings). Metadata only."
provider:
  type: bobbit-extension
  extension: goal-tools.ts
group: Artifacts
renderer: src/ui/tools/renderers/ArtifactToolRenderers.ts
docs: |
  List all artifacts for the current goal. Returns metadata only (name, type,
  version, ID) — not the full content. Use `artifact_get` to read content.

  No parameters required. Returns an array of artifact metadata objects.
