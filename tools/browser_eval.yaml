name: browser_eval
description: "Execute JavaScript in the page"
summary: "Execute JavaScript in the headless browser page context and return the result."
provider:
  type: user-extension
  extension: playwright/index.ts
group: Browser
renderer: src/ui/tools/renderers/BrowserEvalRenderer.ts
docs: |
  Execute arbitrary JavaScript in the context of the current browser page. Has
  full access to the DOM, window, and any loaded scripts. The return value of
  the last expression is serialized and returned.

  Parameters:
  - `expression` (required): JavaScript expression or code to evaluate

  Use `JSON.stringify()` for complex return values. Async expressions (Promises)
  are awaited automatically. Side effects persist until the next navigation.
