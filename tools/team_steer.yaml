name: team_steer
description: "Send a mid-turn redirect to a running agent"
summary: "Send a mid-turn redirect to a running agent to change its direction."
provider:
  type: bobbit-extension
  extension: team-lead-tools.ts
group: Team
renderer: src/ui/tools/renderers/TeamToolRenderers.ts
docs: |
  Send a mid-turn redirect to a running agent. Use when an agent is actively
  working but needs course correction without waiting for it to finish.

  Parameters:
  - `session_id` (required): Session ID of the agent to steer
  - `message` (required): Redirect instruction for the agent

  Only works on agents that are currently streaming/working.
