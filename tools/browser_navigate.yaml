name: browser_navigate
description: "Navigate to a URL in headless browser"
summary: "Navigate to a URL in a headless browser. Launches browser if needed."
provider:
  type: user-extension
  extension: playwright/index.ts
group: Browser
renderer: src/ui/tools/renderers/BrowserNavigateRenderer.ts
docs: |
  Navigate a headless Chromium browser to a URL. Launches the browser if not
  already running. The browser session persists across calls — cookies,
  localStorage, and page context carry over.

  Parameters:
  - `url` (required): URL to navigate to (must include protocol: https://, http://, file://)

  Waits for DOMContentLoaded before returning. For async content, follow up
  with `browser_wait`. Prefer `web_fetch` for static pages — it's much faster.
