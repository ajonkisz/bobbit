name: delegate
description: "Run a task in a separate agent process"
summary: "Run a task in a separate agent process with full tool access but isolated context."
provider:
  type: user-extension
  extension: delegate.ts
group: Agent
renderer: src/ui/tools/renderers/DelegateRenderer.ts
docs: |
  Run a task in a separate agent process. The delegate has full tool access but receives
  only the instructions you provide — it does not see this conversation. Blocks until
  the delegate finishes and returns its output.

  Supports `parallel` parameter to run multiple delegates concurrently.

  **Only delegate when you need context isolation or mass parallelism (3+ tasks).**
  Never delegate just to read files or for single tasks you could do yourself.
