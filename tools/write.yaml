name: write
description: "Create or overwrite a file"
summary: "Create or overwrite a file. Automatically creates parent directories."
provider:
  type: builtin
  tool: write
group: File System
renderer: src/ui/tools/renderers/WriteRenderer.ts
docs: |
  Write content to a file. Creates the file if it doesn't exist, overwrites if it does.
  Automatically creates parent directories. Use only for new files or complete rewrites —
  for surgical edits to existing files, use `edit` instead.

  **All paths must use forward slashes (`/`), even on Windows.** Never use backslashes.

  Parameters:
  - `path` (required): Path to the file (relative or absolute, forward slashes only)
  - `content` (required): Content to write to the file

  Examples — correct:
  ```
  write("src/ui/components/NewWidget.ts", content)
  write("tests/fixtures/test-data.json", '{"key": "value"}')
  write("C:/Users/jsubr/w/bobbit/tmp/output.txt", result)
  ```

  Examples — WRONG (backslashes):
  ```
  write("src\\ui\\components\\NewWidget.ts", content)      # WRONG
  write("C:\\Users\\jsubr\\tmp\\output.txt", result)       # WRONG
  ```
