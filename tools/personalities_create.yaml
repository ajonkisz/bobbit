name: personalities_create
description: "Define a new personality for agents"
summary: "Define a new personality that can be applied to agents via team_spawn."
provider:
  type: bobbit-extension
  extension: team-lead-tools.ts
group: Team
docs: |
  Define a new personality that can be applied to agents via `team_spawn`.
  Personalities modify how agents approach their work (communication style,
  thoroughness, risk tolerance, etc.).

  Parameters:
  - `name` (required): Unique personality identifier
  - `description` (required): What this personality does
  - `prompt` (required): System prompt additions for this personality
