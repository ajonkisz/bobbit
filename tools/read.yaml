name: read
description: "Read file contents (text or images)"
summary: "Read file contents (text or images). Truncated to 2000 lines or 50KB; use offset/limit for large files."
provider:
  type: builtin
  tool: read
group: File System
renderer: src/ui/tools/renderers/ReadRenderer.ts
docs: |
  Read the contents of a file. Supports text files and images (jpg, png, gif, webp).
  Images are sent as attachments. For text files, output is truncated to 2000 lines or
  50KB (whichever is hit first). Use `offset`/`limit` for large files — continue with
  offset until complete. Use this instead of `cat` or `sed` to examine files before editing.

  **All paths must use forward slashes (`/`), even on Windows.** Never use backslashes.

  Parameters:
  - `path` (required): Path to the file (relative or absolute, forward slashes only)
  - `offset` (optional): Line number to start reading from (1-indexed)
  - `limit` (optional): Maximum number of lines to read

  Examples — correct:
  ```
  read("src/server/cli.ts")
  read("src/ui/components/Input.ts", offset=100, limit=50)
  read("C:/Users/jsubr/w/bobbit/package.json")
  ```

  Examples — WRONG (backslashes):
  ```
  read("src\\server\\cli.ts")                              # WRONG
  read("C:\\Users\\jsubr\\w\\bobbit\\package.json")        # WRONG
  ```
