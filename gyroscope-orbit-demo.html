<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Indicators — Gyroscope &amp; Orbit</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    min-height: 100vh;
  }
  h1 { font-size: 1.4rem; margin-bottom: 32px; color: #aaa; font-weight: 400; }
  h2 { font-size: 0.85rem; color: #888; font-weight: 400; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
  .demos { display: flex; gap: 80px; flex-wrap: wrap; justify-content: center; }
  .demo {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  .stage {
    width: 160px; height: 160px;
    display: flex; align-items: center; justify-content: center;
    perspective: 600px;
  }

  /* ─── Size variants in sidebar context ─── */
  .sidebar-mock {
    margin-top: 60px;
    background: #12121e;
    border-radius: 10px;
    padding: 12px 14px;
    width: 240px;
    border: 1px solid #2a2a3a;
  }
  .sidebar-mock h2 { margin-bottom: 8px; font-size: 0.7rem; }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 8px;
    border-radius: 6px;
    font-size: 0.82rem;
    color: #bbb;
    cursor: default;
    transition: background 0.15s;
  }
  .sidebar-item:hover { background: #ffffff08; }
  .sidebar-item .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #444;
    flex-shrink: 0;
  }
  .sidebar-item .dot.active-plain {
    background: #4ade80;
    box-shadow: 0 0 6px #4ade8066;
  }
  .sidebar-item .indicator-slot {
    width: 14px; height: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* ═══════════════════════════════════════
     1. GYROSCOPE
     ═══════════════════════════════════════ */
  .gyroscope {
    width: var(--g-size, 80px);
    height: var(--g-size, 80px);
    position: relative;
    transform-style: preserve-3d;
    animation: gyro-tumble 6s linear infinite;
  }
  .gyro-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: var(--g-thick, 3px) solid;
    transform-style: preserve-3d;
  }
  .gyro-ring:nth-child(1) {
    border-color: #60a5fa;
    animation: gyro-spin-x 2.4s linear infinite;
  }
  .gyro-ring:nth-child(2) {
    border-color: #a78bfa;
    animation: gyro-spin-y 3.2s linear infinite;
  }
  .gyro-ring:nth-child(3) {
    border-color: #34d399;
    animation: gyro-spin-z 4s linear infinite;
  }
  .gyro-core {
    position: absolute;
    width: var(--g-core, 10px); height: var(--g-core, 10px);
    background: radial-gradient(circle, #fff 0%, #60a5fa 80%);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 var(--g-glow, 12px) #60a5fa88;
  }

  @keyframes gyro-tumble {
    0%   { transform: rotateX(0deg)   rotateY(0deg); }
    100% { transform: rotateX(360deg) rotateY(360deg); }
  }
  @keyframes gyro-spin-x {
    0%   { transform: rotateX(0deg); }
    100% { transform: rotateX(360deg); }
  }
  @keyframes gyro-spin-y {
    0%   { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
  }
  @keyframes gyro-spin-z {
    0%   { transform: rotateZ(0deg); }
    100% { transform: rotateZ(360deg); }
  }

  /* ═══════════════════════════════════════
     2. ORBITING SPHERES
     ═══════════════════════════════════════ */
  .orbit-system {
    width: var(--o-size, 80px);
    height: var(--o-size, 80px);
    position: relative;
    transform-style: preserve-3d;
    perspective: 300px;
  }
  .central-sphere {
    position: absolute;
    width: var(--o-central, 28px); height: var(--o-central, 28px);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fbbf24, #d97706 60%, #92400e);
    box-shadow: 0 0 var(--o-glow, 14px) #fbbf2444;
    animation: central-rotate 3s linear infinite;
  }
  .central-sphere::after {
    content: '';
    position: absolute;
    width: 40%; height: 25%;
    top: 30%; left: 15%;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    filter: blur(1px);
  }

  @keyframes central-rotate {
    0%   { transform: translate(-50%, -50%) rotate(0deg); }
    100% { transform: translate(-50%, -50%) rotate(360deg); }
  }

  .orbit-path {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid #ffffff12;
    transform-style: preserve-3d;
    animation: orbit-tilt 8s linear infinite;
  }
  @keyframes orbit-tilt {
    0%   { transform: rotateX(65deg) rotateZ(0deg); }
    100% { transform: rotateX(65deg) rotateZ(360deg); }
  }

  .orbiter-anchor {
    position: absolute;
    width: 100%; height: 100%;
    animation: orbiter-revolve 2s linear infinite;
    transform-style: preserve-3d;
  }
  @keyframes orbiter-revolve {
    0%   { transform: rotateZ(0deg); }
    100% { transform: rotateZ(360deg); }
  }

  .orbiter {
    position: absolute;
    width: var(--o-moon, 10px); height: var(--o-moon, 10px);
    background: radial-gradient(circle at 35% 35%, #e0f2fe, #38bdf8 60%, #0369a1);
    border-radius: 50%;
    top: 0;
    left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 var(--o-moon-glow, 8px) #38bdf855;
  }

  /* ─── SMALL VARIANTS (for sidebar) ─── */
  .gyroscope.sm {
    --g-size: 14px;
    --g-thick: 1.2px;
    --g-core: 3px;
    --g-glow: 4px;
  }
  .orbit-system.sm {
    --o-size: 14px;
    --o-central: 5px;
    --o-moon: 3px;
    --o-glow: 4px;
    --o-moon-glow: 3px;
  }

  /* ─── Controls ─── */
  .controls {
    margin-top: 50px;
    display: flex; gap: 16px; align-items: center;
  }
  .controls label { font-size: 0.8rem; color: #888; }
  .controls select {
    background: #222; color: #ccc; border: 1px solid #444;
    padding: 4px 8px; border-radius: 4px; font-size: 0.8rem;
  }
</style>
</head>
<body>

<h1>Activity Indicator Concepts</h1>

<!-- ── Large previews ── -->
<div class="demos">
  <div class="demo">
    <h2>1 — Gyroscope</h2>
    <div class="stage">
      <div class="gyroscope">
        <div class="gyro-ring"></div>
        <div class="gyro-ring"></div>
        <div class="gyro-ring"></div>
        <div class="gyro-core"></div>
      </div>
    </div>
  </div>

  <div class="demo">
    <h2>2 — Orbiting Spheres</h2>
    <div class="stage">
      <div class="orbit-system">
        <div class="central-sphere"></div>
        <div class="orbit-path">
          <div class="orbiter-anchor">
            <div class="orbiter"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Sidebar context ── -->
<div class="sidebar-mock">
  <h2>Sessions — sidebar preview</h2>

  <div class="sidebar-item">
    <div class="dot"></div>
    <span>Idle session</span>
  </div>

  <div class="sidebar-item">
    <div class="indicator-slot">
      <div class="gyroscope sm">
        <div class="gyro-ring"></div>
        <div class="gyro-ring"></div>
        <div class="gyro-ring"></div>
        <div class="gyro-core"></div>
      </div>
    </div>
    <span>Active — gyroscope</span>
  </div>

  <div class="sidebar-item">
    <div class="indicator-slot">
      <div class="orbit-system sm">
        <div class="central-sphere"></div>
        <div class="orbit-path">
          <div class="orbiter-anchor">
            <div class="orbiter"></div>
          </div>
        </div>
      </div>
    </div>
    <span>Active — orbit</span>
  </div>

  <div class="sidebar-item">
    <div class="dot active-plain"></div>
    <span>Active — current dot</span>
  </div>

  <div class="sidebar-item">
    <div class="dot"></div>
    <span>Another idle session</span>
  </div>
</div>

<!-- ── Color picker ── -->
<div class="controls">
  <label>Gyro accent:</label>
  <select id="gyro-color">
    <option value="blue" selected>Blue / Purple / Green</option>
    <option value="warm">Amber / Rose / Orange</option>
    <option value="mono">White / Grey / White</option>
  </select>
  <label style="margin-left:16px">Orbit speed:</label>
  <select id="orbit-speed">
    <option value="2s" selected>Normal</option>
    <option value="1.2s">Fast</option>
    <option value="3.5s">Slow</option>
  </select>
</div>

<script>
  const palettes = {
    blue:  ['#60a5fa','#a78bfa','#34d399','#60a5fa'],
    warm:  ['#fbbf24','#fb7185','#f97316','#fbbf24'],
    mono:  ['#e0e0e0','#888888','#e0e0e0','#ffffff'],
  };
  document.getElementById('gyro-color').addEventListener('change', e => {
    const c = palettes[e.target.value];
    document.querySelectorAll('.gyroscope').forEach(g => {
      g.querySelectorAll('.gyro-ring').forEach((r,i) => r.style.borderColor = c[i]);
      const core = g.querySelector('.gyro-core');
      if (core) {
        core.style.background = `radial-gradient(circle, #fff 0%, ${c[0]} 80%)`;
        core.style.boxShadow = `0 0 12px ${c[0]}88`;
      }
    });
  });
  document.getElementById('orbit-speed').addEventListener('change', e => {
    document.querySelectorAll('.orbiter-anchor').forEach(a => {
      a.style.animationDuration = e.target.value;
    });
  });
</script>
</body>
</html>
