<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V4 Bandana — S3 Wider Left</title>
<style>
  :root { --bg: #1a1a2e; --sidebar-bg: #111827; --text: #e0e0e0; --muted: #888; --border: #2a2a4a; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 32px; }
  h1 { font-size: 20px; margin-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 32px; line-height: 1.6; max-width: 800px; }
  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin: 40px 0 16px; }
  .section-title:first-of-type { margin-top: 0; }
  .row { display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; align-items: flex-end; }
  .opt { text-align: center; }
  .opt .label { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
  .opt .sublabel { font-size: 10px; color: var(--muted); line-height: 1.4; margin-bottom: 8px; max-width: 110px; }

  .big { display: inline-flex; align-items: center; justify-content: center; position: relative; overflow: visible; image-rendering: pixelated; background: var(--sidebar-bg); border-radius: 8px; border: 1px solid var(--border); width: 85px; height: 80px; }
  .big .body { position: absolute; left: 14px; top: 22px; display: block; width: 1px; height: 1px; image-rendering: pixelated; transform: scale(5); transform-origin: 0 0; }
  .big .acc  { position: absolute; left: 14px; top: 22px; display: block; width: 1px; height: 1px; image-rendering: pixelated; transform: scale(5) translateY(-0.5px); transform-origin: 0 0; }

  .sidebar-mock { background: var(--sidebar-bg); border-radius: 8px; padding: 6px 0; font-size: 12px; width: 260px; }
  .sidebar-row { display: flex; align-items: center; gap: 6px; padding: 5px 10px; cursor: default; border-radius: 6px; margin: 1px 4px; }
  .sidebar-row.active { background: #1f2937; }
  .sidebar-row .title { flex: 1; font-size: 12px; color: #9ca3af; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sidebar-row .title.bold { font-weight: 600; color: #e0e0e0; }
  .sidebar-row .role-tag { font-size: 8px; color: #6b7280; background: #1f2937; padding: 1px 4px; border-radius: 3px; flex-shrink: 0; }
  .group-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #6b7280; padding: 4px 10px 2px; font-weight: 500; }

  .bw { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 19px; flex-shrink: 0; position: relative; overflow: visible; image-rendering: pixelated; }
  .bw .body { position: absolute; left: 0; top: 4px; display: block; width: 1px; height: 1px; image-rendering: pixelated; transform: scale(1.6); transform-origin: 0 0; }
  .bw .acc  { position: absolute; left: 0; top: 4px; display: block; width: 1px; height: 1px; image-rendering: pixelated; transform: scale(1.6) translateY(-0.5px); transform-origin: 0 0; }
  .bw .acc-nohalf { position: absolute; left: 0; top: 4px; display: block; width: 1px; height: 1px; image-rendering: pixelated; transform: scale(1.6); transform-origin: 0 0; }

  .st-active { animation: refined 1.8s cubic-bezier(0.34, 1.2, 0.64, 1) infinite; }
  @keyframes refined {
    0%   { transform: scale(1.6) translateY(0) scaleY(1); }
    12%  { transform: scale(1.6) translateY(0) scaleY(0.96); }
    38%  { transform: scale(1.6) translateY(-1px) scaleY(1.03); }
    58%  { transform: scale(1.6) translateY(-0.3px) scaleY(1); }
    78%  { transform: scale(1.6) translateY(0) scaleY(0.98); }
    100% { transform: scale(1.6) translateY(0) scaleY(1); }
  }
  .st-active-half { animation: refined-half 1.8s cubic-bezier(0.34, 1.2, 0.64, 1) infinite; }
  @keyframes refined-half {
    0%   { transform: scale(1.6) translateY(-0.5px) scaleY(1); }
    12%  { transform: scale(1.6) translateY(-0.5px) scaleY(0.96); }
    38%  { transform: scale(1.6) translateY(-1.5px) scaleY(1.03); }
    58%  { transform: scale(1.6) translateY(-0.8px) scaleY(1); }
    78%  { transform: scale(1.6) translateY(-0.5px) scaleY(0.98); }
    100% { transform: scale(1.6) translateY(-0.5px) scaleY(1); }
  }
  .st-idle { filter: saturate(0.4); }
  .hue-100 { filter: hue-rotate(100deg); }
  .hue-200 { filter: hue-rotate(200deg); }
  .hue-n85 { filter: hue-rotate(-85deg); }

  .px-base {
    box-shadow:
      3px 0 0 #000,4px 0 0 #000,5px 0 0 #000,6px 0 0 #000,7px 0 0 #000,
      2px 1px 0 #000,3px 1px 0 #8ec63f,4px 1px 0 #8ec63f,5px 1px 0 #8ec63f,6px 1px 0 #b5d98a,7px 1px 0 #b5d98a,8px 1px 0 #000,
      1px 2px 0 #000,2px 2px 0 #8ec63f,3px 2px 0 #8ec63f,4px 2px 0 #8ec63f,5px 2px 0 #8ec63f,6px 2px 0 #8ec63f,7px 2px 0 #b5d98a,8px 2px 0 #8ec63f,9px 2px 0 #000,
      0 3px 0 #000,1px 3px 0 #8ec63f,2px 3px 0 #8ec63f,3px 3px 0 #8ec63f,4px 3px 0 #8ec63f,5px 3px 0 #8ec63f,6px 3px 0 #8ec63f,7px 3px 0 #8ec63f,8px 3px 0 #8ec63f,9px 3px 0 #000,
      0 4px 0 #000,1px 4px 0 #8ec63f,2px 4px 0 #8ec63f,3px 4px 0 #1a3010,4px 4px 0 #8ec63f,5px 4px 0 #8ec63f,6px 4px 0 #1a3010,7px 4px 0 #8ec63f,8px 4px 0 #8ec63f,9px 4px 0 #000,
      0 5px 0 #000,1px 5px 0 #8ec63f,2px 5px 0 #8ec63f,3px 5px 0 #1a3010,4px 5px 0 #8ec63f,5px 5px 0 #8ec63f,6px 5px 0 #1a3010,7px 5px 0 #8ec63f,8px 5px 0 #8ec63f,9px 5px 0 #000,
      0 6px 0 #000,1px 6px 0 #6b9930,2px 6px 0 #8ec63f,3px 6px 0 #8ec63f,4px 6px 0 #8ec63f,5px 6px 0 #8ec63f,6px 6px 0 #8ec63f,7px 6px 0 #8ec63f,8px 6px 0 #8ec63f,9px 6px 0 #000,
      1px 7px 0 #000,2px 7px 0 #6b9930,3px 7px 0 #8ec63f,4px 7px 0 #8ec63f,5px 7px 0 #8ec63f,6px 7px 0 #8ec63f,7px 7px 0 #8ec63f,8px 7px 0 #000,
      2px 8px 0 #000,3px 8px 0 #000,4px 8px 0 #000,5px 8px 0 #000,6px 8px 0 #000,7px 8px 0 #000;
  }

  .acc-crown { box-shadow:
    3px -1px 0 #000, 5px -1px 0 #000, 7px -1px 0 #000,
    2px 0 0 #000, 3px 0 0 #fde047, 4px 0 0 #000, 5px 0 0 #fde047, 6px 0 0 #000, 7px 0 0 #fde047, 8px 0 0 #000,
    1px 1px 0 #000, 2px 1px 0 #fbbf24, 3px 1px 0 #fde047, 4px 1px 0 #fbbf24, 5px 1px 0 #fde047, 6px 1px 0 #fbbf24, 7px 1px 0 #fde047, 8px 1px 0 #fbbf24, 9px 1px 0 #000,
    1px 2px 0 #000, 2px 2px 0 #b45309, 3px 2px 0 #d97706, 4px 2px 0 #d97706, 5px 2px 0 #d97706, 6px 2px 0 #d97706, 7px 2px 0 #d97706, 8px 2px 0 #b45309, 9px 2px 0 #000,
    1px 3px 0 #000, 2px 3px 0 #000, 3px 3px 0 #000, 4px 3px 0 #000, 5px 3px 0 #000, 6px 3px 0 #000, 7px 3px 0 #000, 8px 3px 0 #000, 9px 3px 0 #000;
  }

  /* S3 wider left: band x=0..9, top outline x=1..9, dark→mid→light shading */
  .ban-s3 { box-shadow:
    1px 2px 0 #000, 2px 2px 0 #000, 3px 2px 0 #000, 4px 2px 0 #000, 5px 2px 0 #000, 6px 2px 0 #000, 7px 2px 0 #000, 8px 2px 0 #000, 9px 2px 0 #000,
    0 3px 0 #000, 1px 3px 0 #b91c1c, 2px 3px 0 #dc2626, 3px 3px 0 #ef4444, 4px 3px 0 #ef4444, 5px 3px 0 #ef4444, 6px 3px 0 #ef4444, 7px 3px 0 #ef4444, 8px 3px 0 #f87171, 9px 3px 0 #000,
    0 4px 0 #000, 1px 4px 0 #000, 2px 4px 0 #000, 3px 4px 0 #000, 4px 4px 0 #000, 5px 4px 0 #000, 6px 4px 0 #000, 7px 4px 0 #000, 8px 4px 0 #000, 9px 4px 0 #000,
    10px 3px 0 #000, 10px 4px 0 #b91c1c, 11px 4px 0 #000,
    10px 5px 0 #991b1b, 11px 5px 0 #000, 10px 6px 0 #000;
  }

  .sidebars { display: flex; gap: 16px; flex-wrap: wrap; }
</style>
</head>
<body>

<h1>S3 Bandana — Wider Left</h1>
<p class="subtitle">
  Band now starts at x=0 (was x=2). Dark left edge, subtle light right edge, dark tail. Half-pixel up.
</p>

<div class="section-title">Close-up at 5x</div>
<div class="row">
  <div class="opt">
    <div class="label">Bare</div>
    <div class="big"><span class="body px-base"></span></div>
  </div>
  <div class="opt">
    <div class="label">S3 Wide</div>
    <div class="big"><span class="body px-base"></span><span class="acc ban-s3"></span></div>
  </div>
</div>

<div class="section-title">Sidebar</div>
<div class="sidebars">
  <div class="sidebar-mock">
    <div class="group-label">API Redesign</div>
    <div class="sidebar-row active">
      <div class="bw"><span class="body px-base st-active"></span><span class="acc-nohalf acc-crown st-active"></span></div>
      <span class="title bold">Team Lead</span>
      <span class="role-tag">lead</span>
    </div>
    <div class="sidebar-row">
      <div class="bw"><span class="body px-base st-active hue-100"></span><span class="acc ban-s3 st-active-half"></span></div>
      <span class="title bold">Coder</span>
      <span class="role-tag">coder</span>
    </div>
    <div class="sidebar-row">
      <div class="bw"><span class="body px-base st-active hue-200"></span></div>
      <span class="title bold">Reviewer</span>
    </div>
    <div class="sidebar-row">
      <div class="bw"><span class="body px-base st-idle hue-n85"></span></div>
      <span class="title">Tester</span>
    </div>
  </div>
</div>

</body>
</html>
