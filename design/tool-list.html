<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Management — List View</title>
<style>
/* ============================================================================
 * BOBBIT DESIGN TOKENS (from src/ui/app.css dark mode)
 * ============================================================================ */
:root {
  --background: oklch(0.21 0.008 145);
  --foreground: oklch(0.96 0.008 140);
  --card: oklch(0.24 0.01 145);
  --secondary: oklch(0.27 0.012 145);
  --secondary-foreground: oklch(0.96 0.008 140);
  --muted: oklch(0.27 0.012 145);
  --muted-foreground: oklch(0.65 0.012 140);
  --accent: oklch(0.32 0.015 145);
  --border: oklch(0.30 0.012 145);
  --input: oklch(0.34 0.012 145);
  --ring: oklch(0.50 0.06 145);
  --primary: oklch(0.72 0.12 140);
  --primary-foreground: oklch(0.18 0.01 145);
  --destructive: oklch(0.65 0.2 25);
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--background);
  color: var(--foreground);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  height: 100vh;
  display: flex;
}

/* ============================================================================
 * TOOLS CONTAINER — mirrors .roles-container
 * ============================================================================ */
.tools-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  background: var(--background);
  color: var(--foreground);
}

/* ============================================================================
 * NAV BAR — mirrors .roles-nav
 * ============================================================================ */
.tools-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--background);
  position: sticky;
  top: 0;
  z-index: 10;
  gap: 12px;
}

.tools-nav-left {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.tools-nav-right {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.tools-back {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--muted-foreground);
  cursor: pointer;
  transition: background 150ms, color 150ms;
}
.tools-back:hover {
  background: var(--secondary);
  color: var(--foreground);
}

.tools-title {
  font-size: 16px;
  font-weight: 600;
  margin: 0;
  white-space: nowrap;
}

/* Button — mirrors mini-lit Button default variant */
.tools-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 6px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 150ms, opacity 150ms;
}
.tools-btn--primary {
  background: var(--primary);
  color: var(--primary-foreground);
}
.tools-btn--primary:hover {
  opacity: 0.9;
}

/* ============================================================================
 * BODY — mirrors .roles-body
 * ============================================================================ */
.tools-body {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 20px;
}

.tools-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 700px;
  margin: 0 auto;
}

/* ============================================================================
 * TOOL GROUP — collapsible sections
 * ============================================================================ */
.tool-group {
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.tool-group-header {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--muted-foreground);
  background: color-mix(in oklch, var(--secondary) 40%, transparent);
  border: none;
  cursor: pointer;
  text-align: left;
  transition: background 120ms, color 150ms;
}
.tool-group-header:hover {
  background: var(--secondary);
  color: var(--foreground);
}

.tool-group-chevron {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  transition: transform 200ms ease;
  color: var(--muted-foreground);
}
.tool-group.collapsed .tool-group-chevron {
  transform: rotate(-90deg);
}

.tool-group-name {
  flex: 1;
}

.tool-group-count {
  font-size: 10px;
  font-weight: 400;
  color: var(--muted-foreground);
  font-variant-numeric: tabular-nums;
}

.tool-group-items {
  display: flex;
  flex-direction: column;
}
.tool-group.collapsed .tool-group-items {
  display: none;
}

/* ============================================================================
 * TOOL ROW — mirrors .role-row pattern
 * ============================================================================ */
.tool-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  cursor: pointer;
  transition: background 150ms;
  border-top: 1px solid color-mix(in oklch, var(--border) 50%, transparent);
}
.tool-row:first-child {
  border-top: 1px solid var(--border);
}
.tool-row:hover {
  background: var(--accent);
}

.tool-row-name {
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-mono);
  color: var(--foreground);
  flex-shrink: 0;
  min-width: 140px;
}

.tool-row-desc {
  font-size: 12px;
  color: var(--muted-foreground);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Renderer status dot */
.tool-row-renderer {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.tool-row-renderer--custom {
  background: #22c55e;
  box-shadow: 0 0 4px rgba(34, 197, 94, 0.4);
}
.tool-row-renderer--default {
  background: color-mix(in oklch, var(--muted-foreground) 40%, transparent);
}

/* Chevron on the right */
.tool-row-arrow {
  width: 14px;
  height: 14px;
  color: var(--muted-foreground);
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 150ms;
}
.tool-row:hover .tool-row-arrow {
  opacity: 1;
}

/* ============================================================================
 * LEGEND (below list)
 * ============================================================================ */
.tools-legend {
  display: flex;
  align-items: center;
  gap: 16px;
  max-width: 700px;
  margin: 12px auto 0;
  padding: 0 2px;
}

.tools-legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--muted-foreground);
}

/* ============================================================================
 * RESPONSIVE — mirrors role-manager.css breakpoints
 * ============================================================================ */
@media (max-width: 768px) {
  .tools-nav {
    padding: 10px 14px;
  }
  .tools-body {
    padding: 14px;
  }
  .tool-row {
    padding: 10px 12px;
    gap: 10px;
  }
  .tool-row-name {
    min-width: 100px;
    font-size: 12px;
  }
  .tool-row-desc {
    font-size: 11px;
  }
}

/* ============================================================================
 * SVG ICONS inline
 * ============================================================================ */
</style>
</head>
<body>

<div class="tools-container">
  <!-- NAV BAR -->
  <div class="tools-nav">
    <div class="tools-nav-left">
      <button class="tools-back" title="Back to sessions" onclick="alert('Navigate to landing page')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      </button>
      <h1 class="tools-title">Tools</h1>
    </div>
    <div class="tools-nav-right">
      <button class="tools-btn tools-btn--primary" onclick="alert('Launch Tool Assistant session')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        Tool Assistant
      </button>
    </div>
  </div>

  <!-- BODY -->
  <div class="tools-body">
    <div class="tools-list" id="toolList"></div>
    <div class="tools-legend">
      <div class="tools-legend-item">
        <span class="tool-row-renderer tool-row-renderer--custom"></span>
        Custom renderer
      </div>
      <div class="tools-legend-item">
        <span class="tool-row-renderer tool-row-renderer--default"></span>
        Default renderer
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================================
// REAL TOOL DATA — from AVAILABLE_TOOLS in role-manager.ts + renderer registry
// ============================================================================
const TOOLS = [
  // File System
  { name: "read", description: "Read file contents (text or images)", group: "File System", hasRenderer: true, rendererFile: "src/ui/tools/renderers/ReadRenderer.ts" },
  { name: "write", description: "Create or overwrite a file", group: "File System", hasRenderer: true, rendererFile: "src/ui/tools/renderers/WriteRenderer.ts" },
  { name: "edit", description: "Replace exact text in a file", group: "File System", hasRenderer: true, rendererFile: "src/ui/tools/renderers/EditRenderer.ts" },
  { name: "ls", description: "List directory contents", group: "File System", hasRenderer: true, rendererFile: "src/ui/tools/renderers/LsRenderer.ts" },
  { name: "find", description: "Search for files by glob pattern", group: "File System", hasRenderer: true, rendererFile: "src/ui/tools/renderers/FindRenderer.ts" },
  { name: "grep", description: "Search file contents for a regex or literal pattern", group: "File System", hasRenderer: true, rendererFile: "src/ui/tools/renderers/GrepRenderer.ts" },

  // Shell
  { name: "bash", description: "Execute shell commands", group: "Shell", hasRenderer: true, rendererFile: "src/ui/tools/renderers/BashRenderer.ts" },

  // Web
  { name: "web_search", description: "Search the web via DuckDuckGo", group: "Web", hasRenderer: true, rendererFile: "src/ui/tools/renderers/WebSearchRenderer.ts" },
  { name: "web_fetch", description: "Fetch a URL and extract text", group: "Web", hasRenderer: true, rendererFile: "src/ui/tools/renderers/WebFetchRenderer.ts" },

  // Browser
  { name: "browser_navigate", description: "Navigate to a URL in headless browser", group: "Browser", hasRenderer: true, rendererFile: "src/ui/tools/renderers/BrowserNavigateRenderer.ts" },
  { name: "browser_screenshot", description: "Take a screenshot of the page", group: "Browser", hasRenderer: true, rendererFile: "src/ui/tools/renderers/ScreenshotRenderer.ts" },
  { name: "browser_click", description: "Click an element by CSS selector", group: "Browser", hasRenderer: true, rendererFile: "src/ui/tools/renderers/BrowserClickRenderer.ts" },
  { name: "browser_type", description: "Type text into an input element", group: "Browser", hasRenderer: true, rendererFile: "src/ui/tools/renderers/BrowserTypeRenderer.ts" },
  { name: "browser_eval", description: "Execute JavaScript in the page", group: "Browser", hasRenderer: true, rendererFile: "src/ui/tools/renderers/BrowserEvalRenderer.ts" },
  { name: "browser_wait", description: "Wait for an element to appear", group: "Browser", hasRenderer: true, rendererFile: "src/ui/tools/renderers/BrowserWaitRenderer.ts" },

  // Agent
  { name: "delegate", description: "Run a task in a separate agent process", group: "Agent", hasRenderer: true, rendererFile: "src/ui/tools/renderers/DelegateRenderer.ts" },

  // Team
  { name: "team_spawn", description: "Spawn a role agent with its own worktree", group: "Team", hasRenderer: true, rendererFile: "src/ui/tools/renderers/TeamToolRenderers.ts" },
  { name: "team_list", description: "List all agents in the team", group: "Team", hasRenderer: true, rendererFile: "src/ui/tools/renderers/TeamToolRenderers.ts" },
  { name: "team_dismiss", description: "Terminate an agent and clean up", group: "Team", hasRenderer: true, rendererFile: "src/ui/tools/renderers/TeamToolRenderers.ts" },
  { name: "team_complete", description: "Dismiss all agents and complete goal", group: "Team", hasRenderer: true, rendererFile: "src/ui/tools/renderers/TeamToolRenderers.ts" },

  // Tasks
  { name: "task_list", description: "List all tasks for the goal", group: "Tasks", hasRenderer: true, rendererFile: "src/ui/tools/renderers/TaskToolRenderers.ts" },
  { name: "task_create", description: "Create a new task with type and dependencies", group: "Tasks", hasRenderer: true, rendererFile: "src/ui/tools/renderers/TaskToolRenderers.ts" },
  { name: "task_update", description: "Update task fields, assignment, or state", group: "Tasks", hasRenderer: true, rendererFile: "src/ui/tools/renderers/TaskToolRenderers.ts" },

  // Artifacts
  { name: "artifact_list", description: "List all goal artifacts", group: "Artifacts", hasRenderer: true, rendererFile: "src/ui/tools/renderers/ArtifactToolRenderers.ts" },
  { name: "artifact_create", description: "Create a goal artifact (design doc, findings, etc.)", group: "Artifacts", hasRenderer: true, rendererFile: "src/ui/tools/renderers/ArtifactToolRenderers.ts" },
  { name: "artifact_get", description: "Get an artifact's full content", group: "Artifacts", hasRenderer: true, rendererFile: "src/ui/tools/renderers/ArtifactToolRenderers.ts" },
  { name: "artifact_update", description: "Update an artifact's content", group: "Artifacts", hasRenderer: true, rendererFile: "src/ui/tools/renderers/ArtifactToolRenderers.ts" },
];

const GROUP_ORDER = ["File System", "Shell", "Web", "Browser", "Agent", "Team", "Tasks", "Artifacts"];

// Group tools
const grouped = new Map();
for (const tool of TOOLS) {
  if (!grouped.has(tool.group)) grouped.set(tool.group, []);
  grouped.get(tool.group).push(tool);
}

// Render
const listEl = document.getElementById('toolList');

for (const groupName of GROUP_ORDER) {
  const tools = grouped.get(groupName);
  if (!tools) continue;

  const groupEl = document.createElement('div');
  groupEl.className = 'tool-group';
  groupEl.innerHTML = `
    <button class="tool-group-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <svg class="tool-group-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      <span class="tool-group-name">${groupName}</span>
      <span class="tool-group-count">${tools.length} tool${tools.length !== 1 ? 's' : ''}</span>
    </button>
    <div class="tool-group-items">
      ${tools.map(t => `
        <div class="tool-row" tabindex="0" role="button"
             onclick="window.location.href='tool-detail.html?tool=${t.name}'"
             onkeydown="if(event.key==='Enter')this.click()">
          <span class="tool-row-name">${t.name}</span>
          <span class="tool-row-desc">${t.description}</span>
          <span class="tool-row-renderer tool-row-renderer--${t.hasRenderer ? 'custom' : 'default'}"
                title="${t.hasRenderer ? 'Custom renderer' : 'Default renderer'}"></span>
          <svg class="tool-row-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </div>
      `).join('')}
    </div>
  `;
  listEl.appendChild(groupEl);
}
</script>

</body>
</html>
