personas:
  - id: solo-po
    name: Alex
    title: Solo Product Owner
    tier: primary
    background: >
      Technical founder or senior engineer who has a clear product vision but
      can't hire a full team. Uses Claude Code, Cursor, or similar AI coding
      tools. Currently manages agents by hand-editing CLAUDE.md files and
      juggling multiple terminal sessions.
    quote: "I know exactly what I want built. I just need 10 of me to build it."

  - id: team-lead
    name: Jordan
    title: Startup Tech Lead
    tier: secondary
    background: >
      Leads a small engineering team (2-4 humans) augmented with AI agents.
      Needs to keep human and AI contributions coherent. Spends too much time
      reviewing AI-generated PRs that don't match the product vision.
    quote: "Every agent does exactly what I ask, but none of them know what the others are doing."

  - id: agency-pm
    name: Sam
    title: Agency Project Manager
    tier: tertiary
    background: >
      Manages multiple client projects simultaneously. Each project has its
      own agent workforce. Needs to context-switch between products without
      losing coherence in any of them.
    quote: "I run 5 products. I can't hold all the context in my head anymore."
