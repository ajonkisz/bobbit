terms:
  - term: Project
    definition: >
      A Git repo containing product definition files (context/, product/, delivery/).
      One project = one product. Not "workspace" or "repo".

  - term: Context
    definition: >
      The set of documents that define what a product is and who it's for.
      Vision, personas, stories, competitors. Not "prompt" or "instructions".

  - term: Injection
    definition: >
      The act of including a document section in an agent's system prompt.
      Bobbit decides what to inject based on the agent's role.

  - term: Agent
    definition: >
      An AI coding assistant (e.g. Claude Code session) working on delivery.
      Not "bot" or "worker". Agents have roles and receive context.

  - term: Role
    definition: >
      An agent's specialization (e.g. Backend Engineer, QA, Supervisor).
      Determines which context sections are injected. Not "type" or "kind".

  - term: Revision
    definition: >
      A proposed change to a product document, submitted by an agent for
      human review. Not "PR" or "edit" (those mean different things).

  - term: Guardrail
    definition: >
      A hard constraint that agents must never violate. Shown with red
      accent in UI. Not "rule" or "guideline" (those are softer).

  - term: Workstream
    definition: >
      A named area of delivery containing milestones (e.g. "Auth & Identity").
      Not "epic" or "track".
