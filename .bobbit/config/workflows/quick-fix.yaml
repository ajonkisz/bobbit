id: quick-fix
name: Quick Fix
description: Fast workflow for small changes — skip design, go straight to implementation and merge
gates:
  - id: implementation
    name: Implementation
    verify:
      - name: Type check passes
        type: command
        run: "{{project.typecheck_command}}"
      - name: Unit tests
        type: command
        run: "{{project.test_unit_command}}"
      - name: E2E tests
        type: command
        run: "{{project.test_e2e_command}}"
      - name: Gap analysis
        type: llm-review
        prompt: |-
          Compare the goal specification to the actual implementation on this branch.

          The goal spec is:
          {{goal_spec}}

          Run `git diff {{master}}...{{branch}} -- . ':!package-lock.json'` to see the implementation diff.

          Identify:
          1. Requirements in the goal spec not addressed by the changes
          2. Acceptance criteria not met by the code
          3. Implemented behavior that contradicts the specification
          4. Any unrelated or unnecessary changes
      - name: Code quality review
        type: llm-review
        prompt: |-
          Review the code changes on branch {{branch}} vs {{master}} for quality.

          Run `git diff {{master}}...{{branch}} -- . ':!package-lock.json'` to see changes.
          Read modified files for full context.

          Check:
          1. Correctness — logic errors, off-by-one, race conditions
          2. Error handling — missing try/catch, unhandled promise rejections
          3. Edge cases — null/undefined, empty arrays, boundary values
          4. Minimality — no unrelated changes, no dead code
          5. Test coverage — are new behaviors tested?
  - id: ready-to-merge
    name: Ready to Merge
    depends_on:
      - implementation
    verify:
      - name: "Branch pushed to remote"
        type: command
        run: "git push origin {{branch}} && git ls-remote --heads origin {{branch}} | grep -q ."
      - name: "Master merged into branch"
        type: llm-review
        prompt: |
          Merge {{master}} into the goal branch {{branch}} so the PR is up-to-date and conflict-free.

          1. Run `git fetch origin {{master}}` to get latest master.
          2. Run `git merge origin/{{master}}` to merge master into the current branch.
          3. If there are conflicts, resolve them intelligently:
             - Read both sides of each conflict to understand intent.
             - Keep the goal branch's new functionality while incorporating master's updates.
             - After resolving, run `{{project.typecheck_command}}` and `{{project.test_unit_command}}` to verify the merge is clean.
             - Commit the merge.
          4. If the merge was clean (no conflicts), no further action needed.
          5. Push the updated branch: `git push origin {{branch}}`

          Report whether the merge was clean or required conflict resolution, and confirm all resolved.
      - name: "PR raised"
        type: llm-review
        prompt: |
          Ensure a pull request exists for branch {{branch}} targeting {{master}}.

          1. Check if a PR already exists: `git ls-remote --refs origin refs/pull/*/head` or use `gh pr list --head {{branch}}` if gh CLI is available.
          2. If no PR exists, create one using `gh pr create --base {{master}} --head {{branch}} --title "<goal title>" --body "<summary of changes>"`.
             - The title should be concise and descriptive.
             - The body should summarize what changed and why, referencing the goal spec.
          3. If a PR already exists, confirm it is open and targeting {{master}}.

          Report the PR URL or number.
