name: task_create
description: "Create a new task with type and dependencies"
summary: "Create a new task with type, spec, and dependency tracking."
provider:
  type: bobbit-extension
  extension: extension.ts
group: Tasks
renderer: src/ui/tools/renderers/TaskToolRenderers.ts
docs: |-
  Server enforces upstream gate dependencies (409 Conflict if unmet). Tasks start as `todo`. `type` is one of: implementation, code-review, testing, bug-fix, refactor, custom. Use `depends_on` for explicit ordering.
detail_docs: >-
  ## Purpose


  Create a new task within the current goal's task board. Tasks track units of
  work (implementation, code review, testing, bug fixes, refactoring) with
  dependencies between them. Each task has a lifecycle: `todo` → `in-progress` →
  `complete` (or `blocked`/`skipped`).


  Tasks are the primary coordination mechanism in team workflows. The team lead
  creates tasks, assigns them to agents, and tracks progress.


  **Gate enforcement**: The server checks that upstream workflow gates have
  passed before allowing task creation. If required upstream gates haven't
  passed, the tool returns a **409 Conflict** error explaining what's needed.


  ## Parameters


  | Name | Type | Required | Description |

  |------|------|----------|-------------|

  | `title` | string | **Yes** | Short, descriptive task title. Should be clear
  enough to understand the task at a glance. |

  | `type` | string | **Yes** | Task type. One of: `implementation`,
  `code-review`, `testing`, `bug-fix`, `refactor`, `custom`. Determines gate
  requirements and workflow ordering. |

  | `spec` | string | No | Detailed specification for the task. Include
  requirements, file paths, acceptance criteria, and any relevant context. |

  | `depends_on` | string[] | No | Array of task IDs that must be completed
  before this task can start. Creates explicit dependency ordering. |

  | `parent_task_id` | string | No | ID of a parent task. Links this task as a
  sub-task of the parent, creating a hierarchical task structure. |


  ## When to Use


  - **Planning a goal's work** — break down the goal into tasks before spawning
  agents.

  - **Tracking implementation work** — create implementation tasks for each
  distinct feature or component.

  - **Ordering dependencies** — ensure review happens after implementation,
  testing after review.

  - **Adding tasks mid-flight** — create new tasks as the need emerges (e.g.,
  bug-fix tasks discovered during review).

  - **Sub-tasks** — break a large task into smaller sub-tasks using
  `parent_task_id`.


  ## When NOT to Use


  - **Without a goal** — tasks belong to goals. Create a goal first.

  - **Without required upstream gates having passed — signal the upstream gate
  first.


  ## Examples


  ```

  # Create an implementation task

  task_create(title="Implement tool metadata REST API", type="implementation",
    spec="Create GET/PUT /api/tools/:name endpoints in server.ts. GET returns tool detail including docs field. PUT accepts {description?, group?, docs?} and persists via ToolStore. Return 404 for unknown tools.")

  # Create a testing task that depends on implementation

  task_create(title="Write E2E tests for tool API", type="testing",
    depends_on=["impl-task-id-123"],
    spec="Cover: GET /api/tools (list), GET /api/tools/:name (detail), PUT /api/tools/:name (update), 404 for unknown. Use patterns from tests/e2e/.")

  # Create a sub-task under a parent task

  task_create(title="Implement GET /api/tools/:name", type="implementation",
    parent_task_id="parent-task-id-456",
    spec="Implement the GET endpoint only. Return full tool detail including docs field.")

  # Create a bug-fix task discovered during review

  task_create(title="Fix missing input validation on PUT /api/tools",
  type="bug-fix",
    spec="The PUT endpoint accepts any body without validation. Add schema checking: description must be string, group must be from allowed list, docs must be string.")
  ```


  ## Notes / Gotchas


  - **409 Conflict — if required upstream gates haven't passed, the server
  rejects the request and tells you which gate must pass first.

  - **Tasks start as `todo`** — use `task_update` to transition them to
  `in-progress` and assign to agents.

  - **Dependencies are advisory** — the system tracks them but doesn't enforce
  ordering. It's the team lead's responsibility to respect dependencies when
  assigning work.

  - **Type matters** — the `type` field determines which gate requirements apply
  and helps organize the task board.

  - **Parent tasks** — use `parent_task_id` to create hierarchical task
  structures. The parent task ID must refer to an existing task.
