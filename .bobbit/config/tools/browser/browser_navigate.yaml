name: browser_navigate
description: "Navigate to a URL in headless browser"
summary: "Navigate to a URL in a headless browser. Launches browser if needed."
provider:
  type: bobbit-extension
  extension: extension.ts
group: Browser
renderer: src/ui/tools/renderers/BrowserNavigateRenderer.ts
docs: |-
  Session persists across navigations (cookies, localStorage). Prefer `web_fetch` for static pages (10x faster). Waits for DOMContentLoaded only — use `browser_wait` for async content.
detail_docs: >-
  ## Purpose


  Navigate a headless Chromium browser to a specified URL. If no browser is
  currently running, one is launched automatically. The browser session persists
  across all browser tool calls — cookies, localStorage, session state, and page
  context carry over between navigations.


  This is the entry point for all browser-based interactions. After navigating,
  use `browser_screenshot`, `browser_click`, `browser_type`, `browser_eval`, and
  `browser_wait` to interact with the page.


  ## Parameters


  | Name | Type | Required | Description |

  |------|------|----------|-------------|

  | `url` | string | **Yes** | The URL to navigate to. Must include protocol
  (https://, http://, file://). |


  ## When to Use


  - **JavaScript-rendered pages** — SPAs (React, Vue, Angular) that require JS
  to display content.

  - **Interactive testing** — verifying UI behavior by clicking, typing, and
  observing results.

  - **Pages requiring authentication** — login flows where you need to type
  credentials and submit forms.

  - **Local development servers** — checking your own app running on localhost.

  - **Visual verification** — navigating to a page to take a screenshot for UI
  review.


  ## When NOT to Use


  - **Static documentation and articles** — use `web_fetch` instead. It's 10x
  faster and extracts clean text.

  - **Simple API calls** — use `bash` with `curl` for REST API testing.

  - **Searching the web** — use `web_search` for DuckDuckGo results.

  - **Reading known URLs with static content** — `web_fetch` is faster and
  returns cleaner text.


  ## Examples


  ```

  # Navigate to a local dev server to check UI

  browser_navigate(url="https://localhost:5173")


  # Open a JavaScript-heavy documentation site

  browser_navigate(url="https://react.dev/reference/react/useState")


  # Navigate to a page requiring client-side rendering

  browser_navigate(url="https://app.example.com/dashboard")


  # Open a local HTML fixture for testing

  browser_navigate(url="file:///C:/Users/user/project/tests/fixtures/test.html")

  ```


  ## Notes / Gotchas


  - **Slower than `web_fetch`** — the browser has significant overhead (launch,
  rendering, JS execution). Only use when you genuinely need a full browser.

  - **Persistent session** — the browser stays open and state carries over.
  Navigating to a new URL preserves cookies and localStorage from previous pages
  on the same origin.

  - **Self-signed certs** — the headless browser may reject self-signed HTTPS
  certificates. For local dev servers, use `http://` or configure the browser to
  accept insecure certs.

  - **Follows redirects** — HTTP redirects and JS-based redirects are followed
  automatically.

  - **Page load wait** — the tool waits for the `DOMContentLoaded` event before
  returning, which fires when HTML is parsed but before images, stylesheets, and
  subframes finish loading. For content that loads asynchronously after
  DOMContentLoaded, follow up with `browser_wait`.
