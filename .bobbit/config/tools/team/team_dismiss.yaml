name: team_dismiss
description: "Terminate an agent and clean up"
summary: "Terminate a team agent and clean up its worktree."
provider:
  type: bobbit-extension
  extension: extension.ts
group: Team
renderer: src/ui/tools/renderers/TeamToolRenderers.ts
docs: |-
  Terminates a specific agent session and cleans up its worktree. Use after the agent's work is merged back to the goal branch.
detail_docs: >-
  ## Purpose


  Terminate a specific team agent and clean up its resources. This kills the
  agent's session, removes its git worktree, and frees the associated system
  resources. The agent is permanently removed from the team.


  ## Parameters


  | Name | Type | Required | Description |

  |------|------|----------|-------------|

  | `session_id` | string | **Yes** | The session ID of the agent to dismiss.
  Get this from `team_list`. |


  ## When to Use


  - **Agent completed its task** — the agent has finished, merged its work, and
  is idle.

  - **Agent is stuck or broken** — the agent is producing incorrect output or is
  in an unrecoverable state.

  - **Resource management** — freeing up resources by removing agents that are
  no longer needed.

  - **Replacing an agent** — dismiss the old one before spawning a replacement.


  ## When NOT to Use


  - **Agent hasn't merged its work** — ensure the agent has pushed and merged
  changes to the goal branch first, or the work will be lost with the worktree.

  - **Dismissing all agents** — use `team_complete` instead for a clean
  end-of-goal dismissal.


  ## Examples


  ```

  # Dismiss a coder that has finished and merged its work

  team_dismiss(session_id="abc123-def456-789")


  # Dismiss a stuck agent to replace with a new one

  team_dismiss(session_id="stuck-agent-session-id")

  ```


  ## Notes / Gotchas


  - **Team lead only** — only team lead sessions can dismiss agents.

  - **Irreversible** — the agent's session is killed and its worktree is
  deleted. Any uncommitted or unmerged work is lost.

  - **Verify merge first** — always confirm the agent has merged its changes
  back to the goal branch before dismissing. Check with `team_list` or review
  the git log.

  - **Worktree cleanup** — the agent's isolated git worktree directory is
  removed automatically.
