id: evidence-of-documentation
name: Evidence of Documentation
description: Verifies that proper documentation exists for the changes made - updated AGENTS.md, inline code comments, and relevant doc files.
kind: verification
format: markdown
mustHave:
  - Checklist of documentation areas reviewed (AGENTS.md, inline comments, doc files)
  - Verification that AGENTS.md reflects current architecture and new features
  - Confirmation that new/modified functions have meaningful inline comments
  - List of doc files checked or updated with change summary
  - Pass/fail verdict per documentation area
shouldHave:
  - Diff excerpts showing documentation additions or updates
  - Suggestions for missing documentation that should be added
  - Assessment of README or user-facing docs if applicable
mustNotHave:
  - Auto-generated boilerplate comments with no real information
  - Approval without actually verifying documentation exists
  - Modifications to code logic - documentation review only
requires:
  - implementation
suggestedRole: reviewer
createdAt: 1774052977983
updatedAt: 1774052977983
