<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bobbit + Flask Colour Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: -apple-system, system-ui, sans-serif; padding: 20px; }
h1 { font-size: 18px; margin-bottom: 4px; color: #fff; }
h2 { font-size: 14px; margin-bottom: 12px; color: #888; font-weight: normal; }
h3 { font-size: 13px; margin: 16px 0 8px; color: #aaa; }

.controls { margin-bottom: 20px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.controls label { font-size: 13px; color: #aaa; }
.controls select, .controls input { background: #2a2a4a; color: #e0e0e0; border: 1px solid #444; border-radius: 4px; padding: 4px 8px; font-size: 13px; }

.grid { display: flex; flex-wrap: wrap; gap: 12px; }
.card {
  background: #16213e;
  border-radius: 8px;
  padding: 12px;
  width: 100px;
  text-align: center;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.2s, opacity 0.2s;
  position: relative;
}
.card:hover { border-color: #555; }
.card.selected { border-color: #4ade80; }
.card.excluded { opacity: 0.25; border-color: #ef4444; }
.card.ugly-flask { box-shadow: inset 0 -3px 0 #b45309; }

.sprite-container {
  width: 60px;
  height: 50px;
  margin: 0 auto 8px;
  position: relative;
  image-rendering: pixelated;
}

.bobbit-sprite, .flask-sprite {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: visible;
  image-rendering: pixelated;
}

.bobbit-sprite {
  transform: scale(4);
  transform-origin: 0 0;
  left: 4px;
  top: 4px;
}

.flask-sprite {
  transform: scale(4);
  transform-origin: 0 0;
  left: 4px;
  top: 4px;
}

.card .label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
.card .hue-val { font-size: 13px; font-weight: bold; }
.card .flask-hue { font-size: 10px; color: #888; margin-top: 2px; }
.card .flask-desc { font-size: 10px; margin-top: 1px; font-weight: bold; }

.summary { margin-top: 20px; padding: 16px; background: #16213e; border-radius: 8px; }
.summary code { background: #2a2a4a; padding: 2px 6px; border-radius: 3px; font-size: 12px; }

.hue-wheel {
  width: 100%;
  max-width: 600px;
  height: 60px;
  margin: 12px 0;
  border-radius: 8px;
  position: relative;
}

.wheel-marker {
  position: absolute;
  width: 4px;
  height: 100%;
  top: 0;
  border-radius: 2px;
  border: 1px solid #000;
}
.wheel-marker.bobbit { border-bottom: 3px solid #fff; }
.wheel-marker.flask { border-top: 3px solid #fff; }
.wheel-label {
  position: absolute;
  top: -16px;
  font-size: 9px;
  color: #fff;
  white-space: nowrap;
  transform: translateX(-50%);
}

.legend { display: flex; gap: 16px; margin: 12px 0; font-size: 12px; align-items: center; }
.legend-swatch { width: 14px; height: 14px; border-radius: 3px; display: inline-block; vertical-align: middle; margin-right: 4px; }

.ugly-zone { font-size: 11px; color: #f59e0b; margin: 8px 0; }

.btn { background: #4ade80; color: #000; border: none; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 12px; font-weight: bold; }
.btn:hover { background: #22c55e; }
.btn-danger { background: #ef4444; }
.btn-danger:hover { background: #dc2626; }
</style>
</head>
<body>
<h1>Bobbit + Flask Colour Explorer</h1>
<h2>Click a colour to include/exclude it. The flask intentionally hue-rotates with the bobbit.</h2>

<div class="legend">
  <span><span class="legend-swatch" style="background:#4ade80;"></span> Selected</span>
  <span><span class="legend-swatch" style="background:#ef4444;"></span> Excluded</span>
  <span><span class="legend-swatch" style="background:#b45309;border-bottom:2px solid #b45309;"></span> Ugly flask zone (brown/muddy)</span>
</div>

<div class="controls">
  <label>Background: </label>
  <select id="bg-select">
    <option value="#1a1a2e">Dark (default)</option>
    <option value="#0f172a">Slate dark</option>
    <option value="#1e293b">Slate</option>
    <option value="#f8fafc">Light</option>
    <option value="#ffffff">White</option>
  </select>
  <label>Sort: </label>
  <select id="sort-select">
    <option value="rotation">By hue rotation</option>
    <option value="bobbit-hue">By bobbit colour</option>
    <option value="flask-hue">By flask colour</option>
  </select>
  <button class="btn" onclick="selectRecommended()">Use recommended</button>
  <button class="btn" onclick="selectAll()">Select all</button>
</div>

<div id="grid" class="grid"></div>

<div id="summary" class="summary"></div>

<script>
// The bobbit body pixel art (10x9 grid)
const BOBBIT_SHADOW = `
3px 0px 0 #000,4px 0px 0 #000,5px 0px 0 #000,6px 0px 0 #000,7px 0px 0 #000,
2px 1px 0 #000,3px 1px 0 #8ec63f,4px 1px 0 #8ec63f,5px 1px 0 #8ec63f,6px 1px 0 #b5d98a,7px 1px 0 #b5d98a,8px 1px 0 #000,
1px 2px 0 #000,2px 2px 0 #8ec63f,3px 2px 0 #8ec63f,4px 2px 0 #8ec63f,5px 2px 0 #8ec63f,6px 2px 0 #8ec63f,7px 2px 0 #b5d98a,8px 2px 0 #8ec63f,9px 2px 0 #000,
0px 3px 0 #000,1px 3px 0 #8ec63f,2px 3px 0 #8ec63f,3px 3px 0 #8ec63f,4px 3px 0 #8ec63f,5px 3px 0 #8ec63f,6px 3px 0 #8ec63f,7px 3px 0 #8ec63f,8px 3px 0 #8ec63f,9px 3px 0 #000,
0px 4px 0 #000,1px 4px 0 #8ec63f,2px 4px 0 #8ec63f,3px 4px 0 #1a3010,4px 4px 0 #8ec63f,5px 4px 0 #8ec63f,6px 4px 0 #1a3010,7px 4px 0 #8ec63f,8px 4px 0 #8ec63f,9px 4px 0 #000,
0px 5px 0 #000,1px 5px 0 #8ec63f,2px 5px 0 #8ec63f,3px 5px 0 #1a3010,4px 5px 0 #8ec63f,5px 5px 0 #8ec63f,6px 5px 0 #1a3010,7px 5px 0 #8ec63f,8px 5px 0 #8ec63f,9px 5px 0 #000,
0px 6px 0 #000,1px 6px 0 #6b9930,2px 6px 0 #8ec63f,3px 6px 0 #8ec63f,4px 6px 0 #8ec63f,5px 6px 0 #8ec63f,6px 6px 0 #8ec63f,7px 6px 0 #8ec63f,8px 6px 0 #8ec63f,9px 6px 0 #000,
1px 7px 0 #000,2px 7px 0 #6b9930,3px 7px 0 #8ec63f,4px 7px 0 #8ec63f,5px 7px 0 #8ec63f,6px 7px 0 #8ec63f,7px 7px 0 #8ec63f,8px 7px 0 #000,
2px 8px 0 #000,3px 8px 0 #000,4px 8px 0 #000,5px 8px 0 #000,6px 8px 0 #000,7px 8px 0 #000`;

// The flask pixel art
const FLASK_SHADOW = `
8px 4px 0 #000,9px 4px 0 #8b4513,10px 4px 0 #000,
8px 5px 0 #000,9px 5px 0 #7dd3fc,10px 5px 0 #000,
7px 6px 0 #000,8px 6px 0 #1e3a5f,9px 6px 0 #38bdf8,10px 6px 0 #0ea5e9,11px 6px 0 #000,
6px 7px 0 #000,7px 7px 0 #1e3a5f,8px 7px 0 #0ea5e9,9px 7px 0 #0284c7,10px 7px 0 #0369a1,11px 7px 0 #1e3a5f,12px 7px 0 #000,
6px 8px 0 #000,7px 8px 0 #1e3a5f,8px 8px 0 #0284c7,9px 8px 0 #0c4a6e,10px 8px 0 #082f49,11px 8px 0 #1e3a5f,12px 8px 0 #000,
6px 9px 0 #000,7px 9px 0 #000,8px 9px 0 #000,9px 9px 0 #000,10px 9px 0 #000,11px 9px 0 #000,12px 9px 0 #000`;

// All possible rotations in 5° steps from -180 to 175
const ALL_ROTATIONS = [];
for (let r = -180; r < 180; r += 5) ALL_ROTATIONS.push(r);

// Current palette
const CURRENT = new Set([0, 25, 50, 75, 100, 125, 150, 175, -135, -110, -85, -60, -35, -10, 15, 40, 65]);
const selected = new Set(CURRENT);

// Flask base hue is ~200° (sky blue colours)
const FLASK_BASE_HUE = 200;
// Bobbit base hue is ~90° (green)
const BOBBIT_BASE_HUE = 90;

// "Ugly" flask hue range — brown/muddy tones
const UGLY_MIN = 15;
const UGLY_MAX = 55;

function flaskHue(rotation) {
  return ((FLASK_BASE_HUE + rotation) % 360 + 360) % 360;
}

function bobbitHue(rotation) {
  return ((BOBBIT_BASE_HUE + rotation) % 360 + 360) % 360;
}

function hueToName(h) {
  h = ((h % 360) + 360) % 360;
  if (h < 15) return "Red";
  if (h < 35) return "Orange";
  if (h < 55) return "Brown/Yellow";
  if (h < 75) return "Yellow-Green";
  if (h < 150) return "Green";
  if (h < 180) return "Teal";
  if (h < 210) return "Blue";
  if (h < 250) return "Indigo";
  if (h < 280) return "Violet";
  if (h < 320) return "Purple";
  if (h < 345) return "Pink";
  return "Red";
}

function hueToCSS(h) {
  return `hsl(${h}, 70%, 55%)`;
}

function isUglyFlask(rotation) {
  const fh = flaskHue(rotation);
  return fh >= UGLY_MIN && fh <= UGLY_MAX;
}

// Recommended: current palette minus ugly flask rotations, plus some nice alternatives
function getRecommended() {
  // Start with full range, exclude ugly flask zone, pick well-spaced ones
  const nice = ALL_ROTATIONS.filter(r => !isUglyFlask(r));
  // Pick ~17 well-distributed from nice ones
  const step = Math.floor(nice.length / 17);
  const result = new Set();
  for (let i = 0; i < 17 && i * step < nice.length; i++) {
    result.add(nice[i * step]);
  }
  return result;
}

function selectRecommended() {
  selected.clear();
  for (const r of getRecommended()) selected.add(r);
  render();
}

function selectAll() {
  selected.clear();
  for (const r of ALL_ROTATIONS) selected.add(r);
  render();
}

function toggleRotation(r) {
  if (selected.has(r)) selected.delete(r);
  else selected.add(r);
  render();
}

let sortMode = 'rotation';

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  let rotations = [...ALL_ROTATIONS];
  if (sortMode === 'bobbit-hue') rotations.sort((a, b) => bobbitHue(a) - bobbitHue(b));
  else if (sortMode === 'flask-hue') rotations.sort((a, b) => flaskHue(a) - flaskHue(b));

  for (const rot of rotations) {
    const fh = flaskHue(rot);
    const bh = bobbitHue(rot);
    const ugly = isUglyFlask(rot);
    const isSel = selected.has(rot);
    const isCurrent = CURRENT.has(rot);

    const card = document.createElement('div');
    card.className = 'card' + (isSel ? ' selected' : ' excluded') + (ugly ? ' ugly-flask' : '');
    card.onclick = () => toggleRotation(rot);

    card.innerHTML = `
      <div class="sprite-container">
        <div class="bobbit-sprite" style="box-shadow:${BOBBIT_SHADOW};filter:hue-rotate(${rot}deg);"></div>
        <div class="flask-sprite" style="box-shadow:${FLASK_SHADOW};filter:hue-rotate(${rot}deg);"></div>
      </div>
      <div class="hue-val" style="color:${hueToCSS(bh)}">${rot > 0 ? '+' : ''}${rot}°</div>
      <div class="flask-hue">Flask: ${Math.round(fh)}°</div>
      <div class="flask-desc" style="color:${hueToCSS(fh)}">${hueToName(fh)}</div>
      ${isCurrent ? '<div style="font-size:9px;color:#4ade80;margin-top:2px;">● current</div>' : ''}
    `;
    grid.appendChild(card);
  }

  updateSummary();
}

function updateSummary() {
  const sel = [...selected].sort((a, b) => a - b);
  const summary = document.getElementById('summary');
  
  const uglyCount = sel.filter(r => isUglyFlask(r)).length;
  const flaskHues = sel.map(r => `${hueToName(flaskHue(r))} (${Math.round(flaskHue(r))}°)`);
  
  summary.innerHTML = `
    <h3 style="margin-top:0">Selected: ${sel.length} colours ${uglyCount > 0 ? `<span style="color:#ef4444">(${uglyCount} with ugly flask)</span>` : '<span style="color:#4ade80">✓ No ugly flasks</span>'}</h3>
    <p style="font-size:12px;margin:8px 0;">TypeScript array:</p>
    <code style="display:block;padding:8px;margin:4px 0;font-size:11px;word-break:break-all;">export const BOBBIT_HUE_ROTATIONS = [${sel.join(', ')}];</code>
    <p style="font-size:12px;margin:8px 0;">Flask colours: ${flaskHues.join(', ')}</p>
  `;
}

document.getElementById('bg-select').onchange = function() {
  document.body.style.background = this.value;
};
document.getElementById('sort-select').onchange = function() {
  sortMode = this.value;
  render();
};

render();
</script>
</body>
</html>
