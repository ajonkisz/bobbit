<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bobbit Accessory Preview</title>
<!-- Real app CSS — no duplication -->
<link rel="stylesheet" href="/src/ui/app.css">
<link rel="stylesheet" href="/src/app/app.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 1.5rem; }
h1 { font-size: 1.3rem; text-align: center; margin-bottom: 0.25rem; color: #f8fafc; }
.subtitle { text-align: center; color: #64748b; font-size: 0.8rem; margin-bottom: 1rem; }
h2 { font-size: 1rem; color: #94a3b8; margin: 1.5rem 0 0.75rem; border-bottom: 1px solid #1e293b; padding-bottom: 0.4rem; }

.controls { display: flex; gap: 1rem; justify-content: center; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; padding: 0.75rem; background: #1e293b; border-radius: 8px; }
.controls label { font-size: 0.75rem; color: #94a3b8; }
.controls select, .controls input { background: #0f172a; color: #e2e8f0; border: 1px solid #334155; border-radius: 4px; padding: 4px 8px; font-size: 0.75rem; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 1rem; max-width: 900px; margin: 0 auto; }
.cell { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; padding: 1rem; background: #1e293b; border-radius: 8px; }
.cell-label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }

/* Override blob positioning for preview grid */
.blob-wrap {
  position: relative;
  width: 80px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.blob-wrap .bobbit-blob {
  position: relative;
  margin: 0 !important;
  align-self: center !important;
}

/* Sidebar mock */
.sidebar-mock { background: #111827; border-radius: 8px; padding: 0.5rem; width: 260px; border: 1px solid #1e293b; }
.sidebar-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; }
.sidebar-row:hover { background: #1e293b; }
.sidebar-row.active { background: #1e293b; }
.sidebar-title { font-size: 0.8rem; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-time { font-size: 0.65rem; color: #64748b; }
</style>
</head>
<body>
<h1>Bobbit Accessory Preview</h1>
<p class="subtitle">Uses real app.css + session-colors.ts — what you see here is exactly what renders in the app</p>

<div class="controls">
  <label>Accessory:
    <select id="acc-select">
      <option value="none">(none)</option>
      <option value="crown">Crown</option>
      <option value="bandana">Bandana</option>
      <option value="magnifier" selected>Magnifier</option>
      <option value="palette">Paint Palette</option>
      <option value="headphones">Headphones</option>
      <option value="pencil">Pencil</option>
      <option value="book">Book</option>
      <option value="glasses">Glasses</option>
      <option value="shield">Shield</option>
      <option value="set-square">Set Square</option>
      <option value="flask">Flask</option>
    </select>
  </label>
  <label>Hue:
    <input type="range" id="hue-slider" min="0" max="360" value="0" style="width:120px;">
    <span id="hue-val">0°</span>
  </label>
  <label>State:
    <select id="state-select">
      <option value="">Busy (default)</option>
      <option value="bobbit-blob--idle">Idle</option>
      <option value="bobbit-blob--enter">Enter</option>
      <option value="bobbit-blob--enter-roll">Enter Roll</option>
      <option value="bobbit-blob--exit">Exit</option>
      <option value="bobbit-blob--exit-roll">Exit Roll</option>
      <option value="bobbit-blob--compact-shake">Compact Shake</option>
      <option value="bobbit-blob--compacting">Compacting</option>
      <option value="bobbit-blob--compact-pop">Compact Pop</option>
    </select>
  </label>
</div>

<h2>Sidebar (1.6x) — All Accessories</h2>
<div id="sidebar-section"></div>

<h2>Chat Blob (3.5x) — All Accessories</h2>
<div class="grid" id="all-grid"></div>

<h2>Selected Accessory — All States</h2>
<div class="grid" id="states-grid"></div>

<h2>Selected Accessory — Hue Variants</h2>
<div class="grid" id="hue-grid"></div>

<script type="module">
// Import the real sidebar bobbit renderer and accessory data
import { statusBobbit, ACCESSORIES } from '/src/app/session-colors.ts';
import { html, render as litRender } from '/node_modules/lit/index.js';

const ACC_IDS = Object.keys(ACCESSORIES);
const STATES = [
  { label: 'Busy', cls: '' },
  { label: 'Idle', cls: 'bobbit-blob--idle' },
  { label: 'Enter', cls: 'bobbit-blob--enter' },
  { label: 'Enter Roll', cls: 'bobbit-blob--enter-roll' },
  { label: 'Exit', cls: 'bobbit-blob--exit' },
  { label: 'Exit Roll', cls: 'bobbit-blob--exit-roll' },
  { label: 'Shake', cls: 'bobbit-blob--compact-shake' },
  { label: 'Compacting', cls: 'bobbit-blob--compacting' },
  { label: 'Pop', cls: 'bobbit-blob--compact-pop' },
];
const HUES = [0, 60, 120, 180, 240, 300];

// Generate a fake session ID that produces a specific hue
function fakeSessionId(hue) {
  // statusBobbit uses sessionHueRotation which hashes the ID
  // We'll pass hue via a wrapper approach instead
  return `preview-${hue}`;
}

function makeBlob(accId, stateClass, hue) {
  const accClass = accId && accId !== 'none' ? `bobbit-${accId === 'crown' ? 'crowned' : accId}` : '';
  const blobCls = ['bobbit-blob', stateClass, accClass].filter(Boolean).join(' ');
  return `<div class="blob-wrap" style="--bobbit-hue-rotate: ${hue || 0}deg">
    <div class="${blobCls}">
      <div class="bobbit-blob__sprite"></div>
      <div class="bobbit-blob__crown"></div>
      <div class="bobbit-blob__bandana"></div>
      <div class="bobbit-blob__magnifier"></div>
      <div class="bobbit-blob__palette"></div>
      <div class="bobbit-blob__headphones"></div>
      <div class="bobbit-blob__pencil"></div>
      <div class="bobbit-blob__book"></div>
      <div class="bobbit-blob__glasses"></div>
      <div class="bobbit-blob__shield"></div>
      <div class="bobbit-blob__set-square"></div>
        <div class="bobbit-blob__flask"></div>
      <div class="bobbit-blob__shadow"></div>
    </div>
  </div>`;
}

function renderSidebar(acc) {
  const sidebarEl = document.getElementById('sidebar-section');
  // Use unique fake session IDs so each bobbit gets a different hue via sessionHueRotation
  const fakeIds = ACC_IDS.map((_, i) => `preview-session-${i}-${i * 37}`);

  const streamingRows = ACC_IDS.map((accId, i) => {
    const label = ACCESSORIES[accId].label || accId;
    const isActive = accId === acc;
    const bobbit = statusBobbit('streaming', false, fakeIds[i], isActive, false, false, false, accId);
    return html`
      <div class="sidebar-row ${isActive ? 'active' : ''}">
        ${bobbit}
        <div style="min-width:0;flex:1;">
          <div class="sidebar-title">${label} Session</div>
          <div class="sidebar-time">2m ago</div>
        </div>
      </div>
    `;
  });

  const idleRows = ACC_IDS.map((accId, i) => {
    const label = ACCESSORIES[accId].label || accId;
    const bobbit = statusBobbit('idle', false, fakeIds[i], false, false, false, false, accId);
    return html`
      <div class="sidebar-row">
        ${bobbit}
        <div style="min-width:0;flex:1;">
          <div class="sidebar-title">${label} Session</div>
          <div class="sidebar-time">5m ago</div>
        </div>
      </div>
    `;
  });

  litRender(html`
    <div style="display:flex;gap:1rem;flex-wrap:wrap;">
      <div>
        <div style="font-size:0.7rem;color:#64748b;margin-bottom:0.5rem;">Streaming (busy)</div>
        <div class="sidebar-mock">${streamingRows}</div>
      </div>
      <div>
        <div style="font-size:0.7rem;color:#64748b;margin-bottom:0.5rem;">Idle</div>
        <div class="sidebar-mock">${idleRows}</div>
      </div>
    </div>
  `, sidebarEl);
}

function renderAll() {
  const acc = document.getElementById('acc-select').value;
  const hue = parseInt(document.getElementById('hue-slider').value);
  const stateVal = document.getElementById('state-select').value;

  // Sidebar (uses its own per-session hue, not the slider)
  renderSidebar(acc);

  // All accessories grid (blob)
  document.getElementById('all-grid').innerHTML = ACC_IDS.map(a => `
    <div class="cell">
      ${makeBlob(a, stateVal, hue)}
      <span class="cell-label">${a}</span>
    </div>
  `).join('');

  // All states for selected accessory
  document.getElementById('states-grid').innerHTML = STATES.map(s => `
    <div class="cell">
      ${makeBlob(acc, s.cls, hue)}
      <span class="cell-label">${s.label}</span>
    </div>
  `).join('');

  // Hue variants
  document.getElementById('hue-grid').innerHTML = HUES.map(h => `
    <div class="cell">
      ${makeBlob(acc, stateVal, h)}
      <span class="cell-label">${h}°</span>
    </div>
  `).join('');
}

document.getElementById('acc-select').addEventListener('change', renderAll);
document.getElementById('state-select').addEventListener('change', renderAll);
document.getElementById('hue-slider').addEventListener('input', (e) => {
  document.getElementById('hue-val').textContent = e.target.value + '°';
  renderAll();
});

renderAll();
</script>
</body>
</html>
